  <style>
    :root {
      --fill-blue:     #0066FF;
      --fill-orange:   #EA580C; 
      --fill-green:    #16A34A;
      --fill-black:    #000000;
      --fill-white:    #FFFFFF;
      --fill-gray:     #3C3C43;
      --fill-gray5:    #E5E5EA;
      --fill-gray6:    #F2F2F7;
      --fill-gray-8:   rgba(28,28,28,0.08);
      --fill-gray-16:  rgba(28,28,28,0.16);
      --fill-gray-64:  rgba(28,28,28,0.64);
      --fill-blue-8: rgba(0,102,255,0.08);
      --fill-blue-16: rgba(0,102,255,0.16);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--fill-gray6);
      color: var(--fill-black);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== Header ===== */
    header {
      background: var(--fill-gray6);
      padding: 20px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 200;
    }
    .logo { display: flex; align-items: center; gap: 16px; }
    .logo-icon {
      width: 40px; height: 40px; border-radius: 50%; overflow: hidden;
      flex-shrink: 0; object-fit: cover;
    }
    .logo h1 { font-size: 24px; font-weight: 700; letter-spacing: 1px; color: var(--fill-black); }
    .logo h1 span { color: var(--fill-blue); }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .header-info { font-family: 'Space Mono', monospace; font-size: 14px; color: var(--fill-black); }
    /* 桌面版：回報表單跟檢視切換之間的間距要是 16px，其餘子元素維持 header-right 既有的 12px gap，故補 4px margin 湊成 16px */
    @media (min-width: 769px) {
      .header-right .view-toggle { margin-left: 4px; }
    }

    /* View Toggle */
    .view-toggle {
      display: flex;
      background: none; border: 1px solid var(--fill-blue);
      border-radius: 999px;
      overflow: hidden;
    }
    .view-btn {
      padding: 8px 16px;
      font-size: 14px;
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 400;
      background: none; border: none;
      color: var(--fill-black); cursor: pointer;
      transition: background 0.18s, color 0.18s, font-weight 0.18s;
      display: flex; align-items: center; gap: 4px;
    }
    .map-icon-fill { display: none; }
    .view-btn.active .map-icon-outline { display: none; }
    .view-btn.active .map-icon-fill { display: block; }
    .view-btn:hover { color: var(--fill-blue); }
    .view-btn.active { background: var(--fill-blue); color: var(--fill-white); font-weight: 500; }
    .header-divider { width: 1px; height: 16px; background: var(--fill-gray-64); }
    .report-link { font-size: 14px; color: var(--fill-black); text-decoration: underline; white-space: nowrap; transition: color 0.15s; }
    .report-link:hover { color: var(--fill-blue); }

    /* ===== Toolbar ===== */
    .toolbar {
      padding: 20px 20px;
      display: flex; align-items: center; gap: 8px;
      flex-shrink: 0;
      background: var(--fill-gray6);
    }
    .search-box {
      display: flex; align-items: center;
      background: var(--fill-white);
      border-radius: 9999px; gap: 8px;
      padding: 16px 16px;
      width: 400px;
      flex-shrink: 0;
    }
    .search-box-mobile { display: none; }
    .search-box input {
      background: none; border: none; outline: none;
      color: var(--fill-black); font-family: 'Noto Sans TC', sans-serif;
      font-size: 16px; width: 100%;
    }
    .search-box input::placeholder { color: var(--fill-gray-64); }
    .search-box input:-webkit-autofill,
    .search-box input:-webkit-autofill:focus {
     -webkit-box-shadow: 0 0 0 1000px var(--fill-gray6) inset;
     box-shadow: 0 0 0 1000px var(--fill-gray6) inset;
    }
    .search-clear-btn { display: none; background: none; border: none; padding: 0; cursor: pointer; color: var(--fill-black); flex-shrink: 0; line-height: 0; }
    .search-clear-btn:hover { color: var(--fill-blue); }
    .count-badge { font-family: 'Noto Sans TC', sans-serif; font-size: 14px; color: var(--fill-black); white-space: nowrap; margin-left: auto; }
    .count-badge strong { color: var(--fill-blue); font-size: 16px; font-weight: 700; font-family: 'Space Mono', monospace; }

    /* ===== Visitor Banner ===== */
    .visitor-banner {
      background: var(--fill-blue-8);
      padding: 8px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 500;
      color: var(--fill-blue);
      flex-shrink: 0;
    }
    #visitorCount {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      margin: 0 3px;
    }

    /* ===== A2HS（加到主畫面）Banner ===== */
    .a2hs-banner {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: 12px;
      z-index: 2100; /* 蓋過手機地圖模式的 bottom sheet（z-index: 2000），不管 sheet 展開到哪一層都疊在最上面 */
      background: rgba(255,255,255,0.72);
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
      border: 1px solid var(--fill-blue);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      display: none;
    }
    .a2hs-banner.show { display: block; }
    /* 平板（含 iPad、Android 平板）：固定寬度置中，不用滿版貼滿左右 */
    @media (min-width: 768px) {
      .a2hs-banner {
        left: 50%;
        right: auto;
        bottom: 12px;
        width: 400px;
        transform: translateX(-50%);
      }
    }
    .a2hs-top-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .a2hs-icon { flex-shrink: 0; color: var(--fill-blue); }
    .a2hs-title {
      flex: 1;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--fill-blue);
    }
    .a2hs-close {
      flex-shrink: 0;
      background: none; border: none; padding: 0; cursor: pointer;
      color: var(--fill-black); line-height: 0;
    }
    .a2hs-bottom-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .a2hs-desc {
      flex: 1;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 14px;
      line-height: 21px;
      color: var(--fill-black);
    }
    .a2hs-action {
      flex-shrink: 0;
      background: var(--fill-blue);
      color: var(--fill-white);
      border: none;
      border-radius: 9999px;
      padding: 8px 12px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    /* ===== Filter Pills (dropdown) ===== */
    .filter-bar {
      background: var(--fill-gray6);
      padding: 0px 20px 20px;
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
    }
    .filter-scroll {
      display: flex; align-items: center; gap: 12px;
      min-width: 0;
    }
    .filter-pill-group { position: relative; flex-shrink: 0; }
    .filter-pill {
      display: inline-flex; align-items: center; gap: 2px;
      padding: 8px 12px 8px 16px;
      font-size: 14px;
      line-height: 1.2;
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 400;
      background: var(--fill-white);
      border: none;
      border-radius: 9999px;
      color: var(--fill-black);
      cursor: pointer;
      transition: background 0.18s, color 0.18s;
      white-space: nowrap;
    }
    @media (hover: hover) {
      .filter-pill:hover { color: var(--fill-blue); }
    }
    .filter-pill.active { background: var(--fill-blue); color: var(--fill-white); font-weight: 500; }
    .filter-pill .pill-icon { flex-shrink: 0; display: inline-flex; }
    .filter-pill .pill-clear { display: none; }
    .filter-pill.active .pill-chevron { display: none; }
    .filter-pill.active .pill-clear { display: inline-flex; }
    .filter-pill .pill-chevron { transition: transform 0.18s; }
    .filter-pill.open .pill-chevron { transform: rotate(180deg); }

    /* 排序文字按鈕 */
    .sort-group { position: relative; flex-shrink: 0; margin-left: 4px; } /* filter-bar 既有 gap:12px + 4px = 16px */
    .sort-btn {
      display: inline-flex; align-items: center; gap: 2px;
      background: none; border: none; padding: 8px 0px;
      font-family: 'Noto Sans TC', sans-serif; font-size: 14px; line-height: 16px;
      color: var(--fill-black); cursor: pointer; white-space: nowrap;
    }
    .sort-btn .sort-label { display: flex; align-items: center; gap: 0px; }
    @media (hover: hover) {
      .sort-btn:hover { color: var(--fill-blue); }
    }
    .sort-btn .pill-chevron { flex-shrink: 0; transition: transform 0.18s; }
    .sort-btn.open .pill-chevron { transform: rotate(180deg); }
    @media (max-width: 768px) {
      .sort-btn .sort-label { flex-direction: column; align-items: flex-start; gap: 0; }
    }

    /* Desktop dropdown panel */
    .filter-panel {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      background: var(--fill-white);
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      padding: 20px;
      width: max-content;
      max-width: 320px;
      max-height: 320px;
      overflow-y: auto;
      z-index: 1200;
    }
    .filter-panel.open { display: block; }
    .filter-panel-options { display: flex; flex-wrap: wrap; gap: 12px; }
    .filter-panel-hint {
      font-size: 12px;
      color: var(--fill-gray-64);
      margin-bottom: 16px;
      font-family: 'Noto Sans TC', sans-serif;
    }
    .filter-option {
      padding: 8px 16px;
      border-radius: 9999px;
      border: none;
      background: var(--fill-blue-8);
      color: var(--fill-blue);
      font-size: 14px;
      font-family: 'Noto Sans TC', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .filter-option:hover { background: var(--fill-blue-16); }
    .filter-option.selected { background: var(--fill-blue); color: var(--fill-white); font-weight: 500; }

    /* Desktop sort dropdown（單選，樣式沿用 filter-panel，但選項為直式列表） */
    .sort-panel {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--fill-white);
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      padding: 20px;
      width: max-content;
      min-width: 160px;
      z-index: 1200;
    }
    .sort-panel.open { display: flex; flex-direction: column; }
    .sort-panel .sort-option + .sort-option { margin-top: 8px; }
    .sort-option {
      display: block;
      width: 100%;
      text-align: left;
      padding: 8px 16px;
      border-radius: 9999px;
      border: none;
      background: none;
      color: var(--fill-black);
      font-size: 14px;
      font-family: 'Noto Sans TC', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .sort-option:hover { background: var(--fill-blue-8); color: var(--fill-blue); }
    .sort-option.selected { background: var(--fill-blue); color: var(--fill-white); font-weight: 500; }
    .sort-hint {
      font-size: 12px; color: var(--fill-gray-64);
      padding: 0px 0px 16px; font-family: 'Noto Sans TC', sans-serif;
      display: none;
    }
    .sort-hint.show { display: block; }

    /* Mobile filter sheet */
    .filter-sheet-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.32);
      z-index: 2200; /* 蓋過手機地圖模式的 pin 列表 sidebar（z-index: 2000），避免篩選/排序 sheet 被遮擋 */
    }
    .filter-sheet-overlay.show { display: block; }
    .filter-sheet {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      max-height: 40vh;
      background: var(--fill-gray6);
      border-radius: 16px 16px 0 0;
      z-index: 2201;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .filter-sheet-header {
      display: flex; align-items: center; justify-content: center;
      position: relative;
      flex-shrink: 0;
      padding: 20px 20px 16px;
    }
    .filter-sheet-title { font-size: 16px; font-weight: 500; color: var(--fill-black); }
    .filter-sheet-close {
      position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--fill-black);
      line-height: 0; padding: 0;
    }
    .filter-sheet-body {
      overflow-y: auto;
      padding: 8px 20px 20px;
    }
    .filter-sheet-options {
      display: flex; flex-wrap: wrap; gap: 12px;
      justify-content: flex-start;
      max-width: 100%;
      margin: 0 auto;
    }
    #sortSheetOptions { display: flex; flex-direction: column; gap: 12px; }

    /* Badge */
    .type-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      align-self: flex-start;
      font-size: 12px; font-weight: 500;
      padding: 4px 8px; border-radius: 8px;
      color: var(--fill-black);
    }
    .type-badge.gacha { background: var(--fill-white); border: 1px solid var(--fill-orange); color: var(--fill-orange); }
    .type-badge.photocard { background: var(--fill-white); border: 1px solid var(--fill-green); color: var(--fill-green); }

    @media (max-width: 640px) {
      .filter-bar { padding: 4px 20px 12px 20px; gap: 0; }
      .filter-scroll { overflow-x: auto; gap: 12px; flex: 1; min-width: 0; }
      .filter-scroll::-webkit-scrollbar { display: none; }
      .sort-group { flex-shrink: 0; margin-left: 16px; margin-right: 0px; }
    }

    /* ===== Content ===== */
    .content { flex: 1; overflow: hidden; display: flex; }

    /* ===== Grid View ===== */
    #gridView {
      width: 100%; height: 100%; overflow-y: auto; padding: 20px 20px;
      display: none;
    }
    #gridView.active { display: block; }
    #gridView::-webkit-scrollbar { width: 5px; }
    #gridView::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 4px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    /* ===== Grid cards ===== */
    .loc-card-grid {
      background: var(--fill-blue-8);
      border-radius: 16px;
      border: 1px solid transparent;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      display: flex; flex-direction: column;
    }
    .loc-card-grid:hover {
      border-color: var(--fill-blue);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px var(--fill-blue-16);
    }
    
    .card-top { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .card-name { font-weight: 700; font-size: 16px; line-height: 1.35; color: var(--fill-black); }
    .card-limited { font-size: 14px; color: var(--fill-black); font-weight: 500; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag {
      font-size: 14px; padding: 4px 8px; border-radius: 8px;
      background: var(--fill-gray-8); color: var(--fill-black);
      border: 1px solid var(--fill-gray-64);
    }
    .card-actions { padding: 0px 16px 16px; display: flex; align-items: center; gap: 8px; margin-top: auto; }
    .btn-gmaps {
      display: inline-flex; align-items: center; gap: 2px;
      color: var(--fill-blue); font-size: 14px; font-weight: 400;
      font-family: 'Noto Sans TC', sans-serif;
      text-decoration: underline; text-underline-offset: 3px;
      background: none; border: none; padding: 0;
      transition: opacity 0.2s; white-space: nowrap;
    }
    .btn-gmaps:hover { opacity: 0.75; }
    .btn-expand {
      display: inline-flex; align-items: center; gap: 2px;
      padding: 8px 12px;
      background: var(--fill-blue-8); border: var(--fill-blue) 1px solid;
      border-radius: 999px; color: var(--fill-blue); font-size: 12px;
      font-family: 'Noto Sans TC', sans-serif; cursor: pointer;
      transition: opacity 0.2s;
      margin-left: auto;
    }
    .btn-expand:hover { opacity: 0.85; }
    .btn-expand.open { opacity: 0.85; }
    .chevron { display: inline-block; font-style: normal; }

    .card-detail { overflow: hidden; transition: max-height 0.35s ease; border-top: 1px solid transparent; }
    .card-detail.open { border-top-color: var(--gray-16); }
    .card-detail-inner { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 8px; }
    .detail-row { display: flex; gap: 8px; font-size: 13px; align-items: flex-start; }
    .detail-icon { flex-shrink: 0; font-size: 14px; margin-top: 1px; }
    .detail-text { color: var(--gray-64); line-height: 1.5; }

    /* Grid carousel */
    .carousel-grid { margin-top: 4px; background: var(--gray-8); border-radius: 10px; overflow: hidden; }
    .carousel-grid-img-wrap { width: 100%; background: var(--gray-16); display: flex; align-items: center; justify-content: center; }
    .carousel-grid-img { width: 100%; height: auto; cursor: zoom-in; display: block; }
    .carousel-controls-grid { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 8px; }
    .single-img-wrap { margin-top: 4px; border-radius: 8px; overflow: hidden; }
    .single-img-wrap img { width: 100%; height: auto; object-fit: unset; cursor: zoom-in; display: block; }

    /* ===== Last Updated ===== */
    .last-updated-list-row { display: none; }

    /* ===== Map View ===== */
    #mapView { width: 100%; height: 100%; display: none; }
    #mapView.active { display: flex; }

    /* ===== Sidebar ===== */
    .sidebar {
      width: 400px;
      background: var(--off-white);
      border-right: 1px solid var(--gray-16);
      display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
    }
    .sidebar-placeholder {
      color: var(--fill-black);
      font-size: 14px;
      line-height: 1.6;
      padding-top: 4px;
      text-align: center;
    }
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--gray-16);
    }
    .sidebar-header h2 {
      font-size: 13px; color: var(--gray-64);
      text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px;
    }
    .map-scroll-wrapper { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
    .location-list { padding: 20px 20px; position: relative; }
    .map-scroll-wrapper::-webkit-scrollbar { width: 0px; }
    .map-scroll-wrapper::-webkit-scrollbar-track { background: transparent; }
    .map-scroll-wrapper::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 4px; }

    /* Sidebar card */
    .loc-card {
      background: var(--fill-blue-8);
      border-radius: 16px; padding: 16px; margin-bottom: 20px;
      cursor: pointer; border: 1px solid transparent;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .loc-card:hover { border-color: var(--fill-blue); box-shadow: 0 8px 24px rgba(0,102,255,0.24); }
    .loc-card.active { border-color: var(--fill-blue); }
    .loc-name { font-weight: 700; font-size: 16px; color: var(--fill-black); margin-top: 12px; margin-bottom: 14px; }
    .loc-limited { font-size: 14px; color: var(--fill-black); font-weight: 500; margin-bottom: 12px; }
    .loc-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .loc-tags .tag { font-size: 14px; padding: 4px 8px; }

    /* Map */
    #map { flex: 1; }

    /* ===== 自訂地圖 Marker（取代原本的 🎰 emoji icon）===== */
    .card-marker { background: none; border: none; }
    .marker-pin {
      position: relative;
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--marker-color, var(--fill-orange));
      border: 2.5px solid var(--fill-white);
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      display: flex; align-items: center; justify-content: center;
      transition: width 0.15s, height 0.15s, box-shadow 0.15s;
    }
    .marker-pin svg { width: 16px; height: 16px; fill: var(--fill-white); flex-shrink: 0; }
    .marker-pin .marker-num {
      color: var(--fill-white); font-family: 'Space Mono', monospace;
      font-weight: 700; font-size: 13px; line-height: 1;
    }
    .marker-count {
      position: absolute; top: -4px; right: -4px;
      min-width: 18px; height: 18px; padding: 0 4px;
      border-radius: 999px;
      background: var(--fill-white); color: var(--marker-color, var(--fill-orange));
      border: 1.5px solid var(--marker-color, var(--fill-orange));
      font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; line-height: 1;
    }
    .card-marker.selected .marker-pin { width: 40px; height: 40px; box-shadow: 0 4px 14px rgba(0,0,0,0.45); }
    .card-marker.selected .marker-pin svg { width: 20px; height: 20px; }

    /* 同座標多機的 cluster popup 清單 */
    .cluster-popup-list { display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow-y: auto; }
    .cluster-popup-item {
      display: flex; align-items: center; gap: 12px;
      width: 100%;
      padding: 12px 12px;
      background: var(--fill-white);
      border: 1px solid transparent;
      border-radius: 8px;
      cursor: pointer; text-align: left;
      font-family: 'Noto Sans TC', sans-serif;
      transition: border-color 0.15s, background 0.15s;
    }
    .cluster-popup-item:hover { border-color: var(--fill-blue); background: var(--fill-blue-8); }
    .cluster-popup-item.selected { border-color: var(--fill-blue); background: var(--fill-blue-8); }
    .cluster-popup-item .type-badge { flex-shrink: 0; padding: 4px; align-self: center; }
    .cluster-popup-item .type-badge svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0; }
    .cluster-popup-item-text {
      display: flex; flex-direction: column; gap: 4px;
      flex: 1;
    }
    .cluster-popup-item-name {
      font-size: 14px; font-weight: 500; color: var(--fill-black);
      white-space: nowrap;
    }
    .cluster-popup-item-sub {
      font-size: 12px; font-weight: 400; color: var(--fill-gray-64);
      white-space: nowrap;
    }

    /* ===== Leaflet popup ===== */
    .leaflet-popup-content-wrapper {
      background: var(--fill-gray6); color: var(--fill-black);
      border: 1px solid var(--fill-blue); border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      font-family: 'Noto Sans TC', sans-serif;
    }
    .leaflet-popup-content { margin: 16px !important; position: relative; max-height: 70vh; overflow-y: auto; }
    .popup-close-btn {
      position: absolute; top: 4px; right: 4px; z-index: 10;
      width: 24px; height: 24px;
      background: none; border: none; color: var(--fill-black);
      font-size: 18px; cursor: pointer; line-height: 1;
      display: flex; align-items: center; justify-content: center;
    }
    .popup-close-btn:hover { color: var(--fill-blue); }
    .leaflet-popup-tip { background: var(--fill-gray6); }
    .popup-title { font-weight: 700; font-size: 16px; margin-bottom: 0; color: var(--fill-black); flex: 1; }
    .popup-addr { font-size: 14px; color: var(--fill-black); margin-bottom: 0; }
    .popup-limited {
      display: inline-block; padding: 4px 8px;
      background: var(--fill-gray-8); border: 1px solid var(--fill-gray-64);
      border-radius: 8px; color: var(--fill-black); font-size: 14px; font-weight: 400;
      margin-top: 4px;
    }
    .popup-img-wrap {
      background: var(--fill-gray-8); border-radius: 8px;
      padding: 12px; margin-top: 12px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .popup-img { width: 100%; height: auto; border-radius: 8px; display: block; cursor: zoom-in; }
    .popup-gmaps-link {
      display: inline-flex; align-items: center; gap: 2px;
      margin-top: 12px; color: var(--fill-blue) !important;
      font-size: 14px; font-weight: 400; text-decoration: underline; transition: opacity 0.2s;
    }
    .popup-gmaps-link:hover { opacity: 0.75; }
    .leaflet-popup-content .popup-gmaps-link { color: var(--fill-blue) !important; text-decoration: underline !important; }
    .popup-actions { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
    .popup-actions .popup-gmaps-link { display: inline-flex; margin-top: 0; flex: 1; }
    .popup-share-btn {
      display: inline-flex; align-items: center; gap: 2px;
      padding: 8px 12px;
      background: var(--fill-blue-8); border: var(--fill-blue) 1px solid;
      border-radius: 999px; color: var(--fill-blue); font-size: 12px;
      font-family: 'Noto Sans TC', sans-serif; cursor: pointer;
      transition: opacity 0.2s; white-space: nowrap; flex-shrink: 0;
    }
    .popup-share-btn:hover { opacity: 0.85; }
    #share-toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(8px);
      background: var(--fill-black); color: var(--fill-white);
      padding: 8px 18px; border-radius: 8px; font-size: 14px;
      opacity: 0; transition: opacity 0.2s, transform 0.2s;
      pointer-events: none; z-index: 9999;
    }
    #share-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Popup carousel */
    .carousel { margin-bottom: 0px; }
    .carousel-img-wrap { display: flex; align-items: center; justify-content: center; width: 100%; }
    .carousel-controls { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 12px; }
    .carousel-btn {
      background: var(--fill-blue); color: var(--fill-white); border: none; border-radius: 50%;
      width: 20px; height: 20px; min-width: 20px; font-size: 14px; font-weight: bold;
      line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: opacity 0.2s; padding: 0;
    }
    .carousel-btn:hover { opacity: 0.8; }
    .carousel-counter { font-size: 12px; color: var(--fill-black); min-width: 32px; text-align: center; }

    /* ===== Lightbox ===== */
    .lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.9); z-index: 99999;
      align-items: center; justify-content: center; cursor: zoom-out;
    }
    .lightbox.show { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 8px; }

    /* ===== Grid Detail Modal ===== */
    .grid-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 9999;
      align-items: center; justify-content: center;
      padding: 20px;
    }
    .grid-modal-overlay.show { display: flex; }
    .grid-modal-box {
      background: var(--fill-gray6); border: 1px solid var(--fill-blue);

    .grid-modal-close {
      position: absolute; top: 16px; right: 16px;
      width: 24px; height: 24px; flex-shrink: 0;
      background: none; border: none; color: var(--black);
      font-size: 18px; cursor: pointer; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }
    .grid-modal-close:hover { color: var(--fill-blue); }
    .grid-modal-content { padding: 0 16px 16px; overflow-y: auto; flex: 1; }
    .modal-header { display: flex; align-items: center; padding-right: 4px; margin-bottom: 8px; }
    .modal-info-section { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
    .modal-type-badge { margin: 16px 0 12px; }

    /* ===== Empty ===== */
    .empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--gray-64); font-size: 15px; }

    @media (max-width: 768px) {
      .view-btn .label { display: none; }
      .view-btn { padding: 8px 16px; }
      header { padding: 20px; justify-content: flex-start; gap: 16px; }
      .header-info { display: none; }
      .header-right .report-link,
      .header-right .header-divider { display: none; }

      .logo h1 { font-size: 16px; }
      .toolbar { padding: 12px 20px 12px 20px; }
      .search-box { width: 100%; flex-shrink: 1; }
      .search-box-desktop { display: none; }

      .search-box-mobile input { font-size: 16px; }
      .filter-bar { padding: 4px 20px 12px 20px; gap: 0; }
      .filter-scroll { overflow-x: auto; gap: 12px; flex: 1; min-width: 0; }
      .filter-scroll::-webkit-scrollbar { display: none; }
      .sort-group { flex-shrink: 0; margin-left: 16px; margin-right: 0px; }
      .last-updated-list-row {
        display: flex; align-items: center; justify-content: center;
        gap: 8px; padding-bottom: 20px;
        font-family: 'Space Mono', monospace;
        font-size: 12px; font-weight: 400; color: var(--fill-black);
      }
      body.map-view .last-updated-list-row { display: none; }
      .last-updated-list-row .report-link { font-size: 12px; }
    }

    /* ===== Mobile ===== */
    @media (max-width: 640px) {
      header { padding: 20px; justify-content: flex-start; gap: 16px; }
      .header-info { display: none; }
      .header-right .report-link,
      .header-right .header-divider { display: none; }

      .logo h1 { font-size: 16px; }

      .toolbar { padding: 12px 20px 12px 20px; }
      .search-box { width: 100%; flex-shrink: 1; }
      .search-box-desktop { display: none; }
      .search-box-mobile { display: flex; width: 100%; flex-shrink: 1; padding-top: 12px; padding-bottom: 12px; }
      .search-box-mobile input { font-size: 16px; }

      /* 地圖模式：搜尋框跟地點數維持跟列表模式一樣，共用同一個 .toolbar，不再另外藏起來 */

      /* 地圖模式：bottom sheet */
      #mapView {
        flex-direction: column;
        position: relative;
      }
      #map {
        flex: 1;
        min-height: 0;
        order: unset;
      }
      .sidebar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        height: 98px;
        border-right: none;
        border-top: none;

      body:not(.map-view) .sidebar {

      /* sheet 高度改由 JS 依「篩選列下緣」動態計算並直接寫 inline style，不再用固定 vh class */
      .sheet-handle {

      }

      .sidebar-placeholder { padding: 20px 0; }

      .leaflet-popup-content { max-height: 40vh !important; overflow-y: auto !important; overflow-x: hidden !important; }
    }

  <!-- Grid Detail Modal -->

  <div id="share-toast"></div>

  <!-- A2HS（加到主畫面）Banner -->
  <div class="a2hs-banner" id="a2hsBanner">
    <div class="a2hs-top-row">
      <svg class="a2hs-icon" xmlns="http://www.w3.org/2000/svg" height="16px" viewBox="0 -960 960 960" width="16px" fill="currentColor"><path d="M444-444v120q0 15.3 10.29 25.65Q464.58-288 479.79-288t25.71-10.35Q516-308.7 516-324v-120h120q15.3 0 25.65-10.29Q672-464.58 672-479.79t-10.35-25.71Q651.3-516 636-516H516v-120q0-15.3-10.29-25.65Q495.42-672 480.21-672t-25.71 10.35Q444-651.3 444-636v120H324q-15.3 0-25.65 10.29Q288-495.42 288-480.21t10.35 25.71Q308.7-444 324-444h120Zm48 348q-81 0-153-30t-126-81.66q-54-51.66-85.5-121.5T96-478.81q0-79.81 30-150T208.5-751q52.5-52 122.31-82.5T480-864q81 0 150.84 31.68 69.84 31.69 121.5 86Q804-692 834-619.64q30 72.36 30 154.64v297q0 29.7-21.15 50.85Q821.7-96 792-96H492Z"/></svg>
      <span class="a2hs-title">把 Card Radar 加到主畫面</span>
      <button class="a2hs-close" id="a2hsClose" aria-label="關閉"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
    </div>
    <div class="a2hs-bottom-row">
      <p class="a2hs-desc" id="a2hsDesc"></p>
      <button class="a2hs-action" id="a2hsAction"></button>
    </div>
  </div>

  <script>
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQgBZrLfJlb-JY9YGm3o9vX5w3jG9hojq5E79tStxW1g89rKpuMnaRi1vA833KmZbilAAv9vrhttqQh/pub?gid=0&single=true&output=csv';


    // =============================================
    // 🗂️ SVG Icons
    // =============================================

    let allLocations = [];

    // =============================================
    // 🔽 篩選設定（機台 / IP / 縣市）
    // =============================================
    const FILTER_CONFIG = [
      { key: 'type',  label: '機台', field: 'type',      fixedOptions: ['抽卡機', '相卡機'] },
      { key: 'ip',    label: 'IP',      field: 'character' },
      { key: 'city',  label: '縣市',    field: 'city' },
    ];
    const filterState = { type: [], city: [], ip: [] };
    let filterOptionsData = {};
    let openPanelKey = null;
    let currentFiltered = [];
    let map = null;
    let markers = [];
    let markerByLocId = {}; // loc.id -> 該機台所屬的 marker（同座標多機共用一個 marker，供列表點擊時對照用）
    let viewInitialized = false; // 避免初始化時觸發 view_toggle

    // =============================================
    // 🔽 排序設定（結束日期 / 距離）
    // =============================================
    const SORT_OPTIONS = [
      { key: 'end_date_asc', label1: '結束日', label2: '近到遠', text: '結束日：近到遠' },
      { key: 'distance_asc', label1: '距離',   label2: '近到遠', text: '距離：近到遠' },
      { key: 'distance_desc', label1: '距離',  label2: '遠到近', text: '距離：遠到近' },
    ];
    let sortState = 'end_date_asc'; // default
    let userCoords = null; // { lat, lng }，成功定位後才有值
    let openSortPanel = false;

    // 地圖 marker 用的圖示（與既有 type-badge 同一套 path，白色描邊圓形，跟 OSM 底圖圖示做出區隔）
    const MARKER_ICON_SVG = {
      '相卡機': '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960"><path d="M480-264q72 0 120-49t48-119q0-69-48-118.5T480-600q-72 0-120 49.5T312-432q0 70 48 119t120 49Zm0-72q-42 0-69-27t-27-68q0-40 27-68.5t69-28.5q42 0 69 28.5t27 68.5q0 41-27 68t-69 27ZM168-144q-29 0-50.5-21.5T96-216v-432q0-29 21.5-50.5T168-720h120l50-67q11-14 26-21.5t32-7.5h168q17 0 32 7.5t26 21.5l50 67h120q30 0 51 21.5t21 50.5v432q0 29-21 50.5T792-144H168Z"/></svg>',
      '抽卡機': '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960"><path d="m612-404 31-107q3-11-1-22t-14-18l-93-63q-8-5-16.5-2T508-604l-31 107q-3 11 .5 22t13.5 18l93 63q8 5 17 2t11-12ZM168-222l-30-15q-28-13-38-40t3-55l65-140v250Zm148 78q-31 0-53.5-20.5T240-216v-288l134 360h-58Zm206-4q-31 11-56-1t-36-43L259-660q-11-31 .5-56.5T302-753l294-107q31-11 56 .5t36 42.5l172 472q11 31-.5 56T817-253L522-148Z"/></svg>',
    };
    const MARKER_COLOR = { '抽卡機': 'var(--fill-orange)', '相卡機': 'var(--fill-green)' };

    // 依同座標分組後的 locs 陣列，決定 marker 顏色／圖示／是否顯示數量角標
    function createClusterIcon(locs) {
      const types = [...new Set(locs.map(l => l.type))];
      const isSingleType = types.length === 1;
      const color = isSingleType ? (MARKER_COLOR[types[0]] || 'var(--fill-blue)') : 'var(--fill-blue)';
      const iconInner = isSingleType
        ? (MARKER_ICON_SVG[types[0]] || '')
        : `<span class="marker-num">${locs.length}</span>`;
      const countBadge = locs.length > 1 ? `<div class="marker-count">${locs.length}</div>` : '';
      return L.divIcon({
        html: `<div class="marker-pin" style="--marker-color:${color}">${iconInner}${countBadge}</div>`,
        className: 'card-marker',
        iconSize: [32, 32],
        iconAnchor: [16, 16],
        popupAnchor: [0, -18],
      });
    }

    // =============================================
    // <svg xmlns="http://www.w3.org/2000/svg" height="16px" viewBox="0 -960 960 960" width="16px" fill="currentColor"><path d="M480-191q119-107 179.5-197T720-549q0-105-68.5-174T480-792q-103 0-171.5 69T240-549q0 71 60.5 161T480-191Zm-24.5 67.5Q444-128 433-137q-40-35-86.5-82T260-320q-40-54-66-112.5T168-549q0-134 89-224.5T480-864q133 0 222.5 90.5T792-549q0 58-26.5 117t-66 113q-39.5 54-86 100.5T527-137q-11 9-22.5 13.5T480-119q-13 0-24.5-4.5ZM480-552Zm0 164q62-56 88-81t41-44q14-17 20.5-35.5T636-587q0-35-25.5-60.5T550-673q-21 0-40 9t-30 23q-12-14-30.5-23t-39.5-9q-35 0-60.5 25.5T324-587q0 19 6.5 36t20.5 36q16 21 44 48.5t85 78.5Z"/></svg> 切換視圖
    // =============================================
    function setView(view) {
      document.getElementById('btnGrid').classList.toggle('active', view === 'grid');
      document.getElementById('btnMap').classList.toggle('active', view === 'map');
      document.getElementById('gridView').classList.toggle('active', view === 'grid');
      document.getElementById('mapView').classList.toggle('active', view === 'map');
      document.body.classList.toggle('map-view', view === 'map');

      // GA: view_toggle（跳過頁面初始化那次）
      if (viewInitialized) {
        gtag('event', 'view_toggle', { view_mode: view, device: getDeviceType() });
      }
      viewInitialized = true;

      if (view === 'map') {
        initMap();
        closeDetailPanel();
        initBottomSheet();
        setTimeout(() => { if (map) map.invalidateSize(); }, 50);
      }
    }

    // =============================================
    // <svg xmlns="http://www.w3.org/2000/svg" height="16px" viewBox="0 -960 960 960" width="16px" fill="currentColor"><path d="M480-191q119-107 179.5-197T720-549q0-105-68.5-174T480-792q-103 0-171.5 69T240-549q0 71 60.5 161T480-191Zm-24.5 67.5Q444-128 433-137q-40-35-86.5-82T260-320q-40-54-66-112.5T168-549q0-134 89-224.5T480-864q133 0 222.5 90.5T792-549q0 58-26.5 117t-66 113q-39.5 54-86 100.5T527-137q-11 9-22.5 13.5T480-119q-13 0-24.5-4.5ZM480-552Zm0 164q62-56 88-81t41-44q14-17 20.5-35.5T636-587q0-35-25.5-60.5T550-673q-21 0-40 9t-30 23q-12-14-30.5-23t-39.5-9q-35 0-60.5 25.5T324-587q0 19 6.5 36t20.5 36q16 21 44 48.5t85 78.5Z"/></svg> 初始化地圖（只一次）
    // =============================================
    function initMap() {
      if (map) return;
      map = L.map('map').setView([23.6, 121.0], 8);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors', maxZoom: 19
      }).addTo(map);
      delete L.Icon.Default.prototype._getIconUrl;
      L.Icon.Default.mergeOptions({
        iconRetinaUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png',
        iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
        shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
      });
      // 手動 pan-to-fit：Leaflet 原生 autoPan 在 max-height+overflow 下量不準
      // 改在 popupopen 後用 rAF 拿到真實 render 尺寸再算位移
      map.on('popupopen', function(e) {
        const container = e.popup.getElement();
        if (!container) return;
        requestAnimationFrame(() => {
          const mapRect = map.getContainer().getBoundingClientRect();
          const popupRect = container.getBoundingClientRect();
          const pad = 16;
          let dx = 0, dy = 0;
          if (popupRect.top    < mapRect.top    + pad) dy = popupRect.top    - mapRect.top    - pad;
          if (popupRect.bottom > mapRect.bottom - pad) dy = popupRect.bottom - mapRect.bottom + pad;
          if (popupRect.left   < mapRect.left   + pad) dx = popupRect.left   - mapRect.left   - pad;
          if (popupRect.right  > mapRect.right  - pad) dx = popupRect.right  - mapRect.right  + pad;
          if (dx !== 0 || dy !== 0) map.panBy([dx, dy], { animate: true, duration: 0.25 });
        });
      });

      // 桌面版：點地圖空白處收回側邊欄（marker 本身的 click 預設不會冒泡到這裡）
      map.on('click', () => {
        if (!isMobileMapLayout()) closeDetailPanel();
      });

      renderMapLocations(currentFiltered.length ? currentFiltered : allLocations);
    }

    // =============================================
    // 📍 渲染地圖 markers
    // 同座標的多台機器共用一個 marker（避免完全重疊互相遮蓋），
    // marker 依機台類型上色／加數量角標。
    //
    // 互動模式（對齊 Figma 新版 mobile/desktop 地圖流程）：
    // - Cluster marker（同座標多台機器）：不分裝置，一律用浮動 Leaflet popup 顯示清單。
    // - Mobile（≤640px）：預設 sheet 收在小 peek（放提示文字，跟桌面版同一句文案）；
    //   點單一 marker，或 cluster popup 清單裡的項目，開「摘要卡」中間態；可拖 handle 展開「完整詳情」；
    //   往下滑最低只會停在「摘要卡」，不會自動變不見；只有點 X 才會整個收回 peek。
    // - Desktop：側邊欄固定寬 400 常駐（預設顯示提示文字）；點單一 marker，或 cluster popup 清單裡的項目，
    //   直接在側邊欄顯示完整詳情（popup 不會關閉）；點側邊欄 X 或點地圖空白處都會換回提示文字。
    // =============================================
    function renderMapLocations(data) {
      if (!map) return;
      markers.forEach(m => map.removeLayer(m));
      markers = [];
      markerByLocId = {};
      closeDetailPanel(); // 資料重新渲染（例如篩選條件變了）時，先收掉舊的側邊欄/sheet，避免內容跟新資料兜不起來

      if (data.length === 0) {
        // 篩選結果是 0 筆時，蓋掉 closeDetailPanel 剛設定的預設提示文字，改顯示明確的空狀態
        document.getElementById('locationList').innerHTML = '<div class="sidebar-placeholder">找不到符合的地點 இдஇ</div>';
        return;
      }

      // 依經緯度分組：同一地點（同一商場）常常有好幾台機器共用同一組座標
      const groups = {};
      data.forEach(loc => {
        const key = `${loc.lat},${loc.lng}`;
        (groups[key] = groups[key] || []).push(loc);
      });

      Object.values(groups).forEach(locs => {
        const { lat, lng } = locs[0];
        const marker = L.marker([lat, lng], { icon: createClusterIcon(locs) }).addTo(map);
        markers.push(marker);
        locs.forEach(loc => { markerByLocId[loc.id] = marker; });
        marker.__locs = locs;

        if (locs.length > 1) {
          // 一開始就綁好 popup（不要等點擊時才延遲綁定）。
          // bindPopup() 本身會自動幫 marker 加上「已開啟就關閉、沒開啟就打開」的內建 click 監聽器，
          // 如果我們自己又手動呼叫 openPopup()，兩邊會在同一次點擊裡互相打架
          // （第一次點沒事，因為內建監聽器是在點擊當下才被加進去、來不及在同一輪觸發；
          //  但只要點過一次之後，兩個監聽器都會生效，變成「我們打開、它馬上關掉」，看起來像沒反應）。
          // 所以這裡只負責綁定內容，開合完全交給 Leaflet 自己的內建行為處理。
          bindClusterPopup(marker, locs);
        }

        marker.on('click', () => {
          // GA: map_marker_click
          gtag('event', 'map_marker_click', {
            machine_id: locs.length === 1 ? locs[0].id : null,
            machine_count: locs.length,
            device: getDeviceType(),
          });

          if (locs.length === 1) {
            window.a2hsRecordCardView && window.a2hsRecordCardView();
            if (isMobileMapLayout()) {
              map.closePopup(); // 關掉任何還留著的 cluster popup，不然它會卡在「已開啟」狀態，之後點回去沒反應
              openMobileSheetSummary(locs[0]);
            } else {
              map.closePopup();
              openDesktopSidebar(locs[0]);
            }
          }
          // locs.length > 1（cluster）完全交給 Leaflet 內建的 click-toggle 行為處理，這裡不用再做事
        });
      });
    }

    // ---- 內容組裝：完整詳情／精簡摘要共用同一份欄位邏輯 ----
    function buildDetailContentHtml(loc, { compact = false } = {}) {
      const googleMapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc.city + loc.addr)}`;
      const typeBadge = `<div class="type-badge ${loc.type === '相卡機' ? 'photocard' : 'gacha'}">${loc.type === '相卡機' ? '<svg xmlns="http://www.w3.org/2000/svg" height="16px" viewBox="0 -960 960 960" width="16px" fill="currentColor"><path d="M480-264q72 0 120-49t48-119q0-69-48-118.5T480-600q-72 0-120 49.5T312-432q0 70 48 119t120 49Zm0-72q-42 0-69-27t-27-68q0-40 27-68.5t69-28.5q42 0 69 28.5t27 68.5q0 41-27 68t-69 27ZM168-144q-29 0-50.5-21.5T96-216v-432q0-29 21.5-50.5T168-720h120l50-67q11-14 26-21.5t32-7.5h168q17 0 32 7.5t26 21.5l50 67h120q30 0 51 21.5t21 50.5v432q0 29-21 50.5T792-144H168Z"/></svg> 相卡機' : '<svg xmlns="http://www.w3.org/2000/svg" height="16px" viewBox="0 -960 960 960" width="16px" fill="currentColor"><path d="m612-404 31-107q3-11-1-22t-14-18l-93-63q-8-5-16.5-2T508-604l-31 107q-3 11 .5 22t13.5 18l93 63q8 5 17 2t11-12ZM168-222l-30-15q-28-13-38-40t3-55l65-140v250Zm148 78q-31 0-53.5-20.5T240-216v-288l134 360h-58Zm206-4q-31 11-56-1t-36-43L259-660q-11-31 .5-56.5T302-753l294-107q31-11 56 .5t36 42.5l172 472q11 31-.5 56T817-253L522-148Z"/></svg> 抽卡機'}</div>`;
      // close 按鈕跟 badge 放同一個 flex row、align-items:center 垂直置中，
      // 不再靠 popup-close-btn 原本的 position:absolute;top:4px 硬定位（那個沒辦法保證跟 badge 對齊）
      const headerRow = `
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
          ${typeBadge}
          <button class="popup-close-btn" style="position:static;" onclick="closeDetailPanel()">✕</button>
        </div>
      `;
      const basicRows = `
        ${loc.venue ? `<div class="popup-addr">場地：${loc.venue}</div>` : ''}
        ${loc.addr ? `<div class="popup-addr">地址：${loc.addr}</div>` : ''}
        ${loc.character ? `<div class="popup-addr">IP：${loc.character}</div>` : ''}
        ${loc.edition ? `<div class="popup-addr">彈數：${loc.edition}</div>` : ''}
      `;

      if (compact) {
        return `
          ${headerRow}
          <div class="modal-header"><div class="popup-title">${loc.name}</div></div>
          ${loc.limited ? `<div class="popup-limited">期間限定：${loc.limited}</div>` : ''}
          <div class="modal-info-section">${basicRows}</div>
        `;
      }

      const imgs = loc.image ? loc.image.split(',').map(s => driveUrlToImage(s.trim())).filter(Boolean) : [];
      let imgHtml = '';
      if (imgs.length === 1) {
        imgHtml = `<div class="popup-img-wrap"><img src="${imgs[0]}" class="popup-img" data-lightbox="${imgs[0]}" alt="${loc.name}" /></div>`;
      } else if (imgs.length > 1) {
        const cid = 'detail-carousel-' + loc.id;
        imgHtml = `
          <div class="popup-img-wrap">
            <div class="carousel" id="${cid}" data-index="0" data-imgs='${JSON.stringify(imgs)}'>
              <div class="carousel-img-wrap">
                <img src="${imgs[0]}" class="popup-img carousel-img" data-lightbox="${imgs[0]}" alt="${loc.name}" />
              </div>
              <div class="carousel-controls">
                <button class="carousel-btn" data-carousel-action="prev" data-carousel-id="${cid}">&#8249;</button>
                <span class="carousel-counter">1 / ${imgs.length}</span>
                <button class="carousel-btn" data-carousel-action="next" data-carousel-id="${cid}">&#8250;</button>
              </div>
            </div>
          </div>`;
      }

      return `
        ${headerRow}
        <div class="modal-header"><div class="popup-title">${loc.name}</div></div>
        ${loc.limited ? `<div class="popup-limited">期間限定：${loc.limited}</div>` : ''}
        <div class="modal-info-section">
          ${basicRows}
          ${loc.perDraw ? `<div class="popup-addr">一抽張數：${loc.perDraw}</div>` : ''}
          ${loc.hours ? `<div class="popup-addr">營業時間：${loc.hours}</div>` : ''}
          ${loc.note ? `<div class="popup-addr">備註：${loc.note}</div>` : ''}
        </div>
        <div class="popup-actions">
          <a href="${googleMapsUrl}" target="_blank" class="popup-gmaps-link" onclick="trackGmapsClick('${loc.id}','map_detail_panel')"><svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="currentColor"><path d="M480-191q119-107 179.5-197T720-549q0-105-68.5-174T480-792q-103 0-171.5 69T240-549q0 71 60.5 161T480-191Zm-24.5 67.5Q444-128 433-137q-40-35-86.5-82T260-320q-40-54-66-112.5T168-549q0-134 89-224.5T480-864q133 0 222.5 90.5T792-549q0 58-26.5 117t-66 113q-39.5 54-86 100.5T527-137q-11 9-22.5 13.5T480-119q-13 0-24.5-4.5ZM480-552Zm0 164q62-56 88-81t41-44q14-17 20.5-35.5T636-587q0-35-25.5-60.5T550-673q-21 0-40 9t-30 23q-12-14-30.5-23t-39.5-9q-35 0-60.5 25.5T324-587q0 19 6.5 36t20.5 36q16 21 44 48.5t85 78.5Z"/></svg> 前往 Google Maps 查看 →</a>

    // ---- Desktop：cluster marker 維持浮動 Leaflet popup（不受這次改版影響）----
    function bindClusterPopup(marker, locs) {
      // 大標題：同座標多台機器如果店名（C欄）都一樣就顯示店名；
      // 店名不一樣就退回顯示場地（D欄）；連場地都沒有才用地址（F欄）
      const uniqueNames = [...new Set(locs.map(l => l.name).filter(Boolean))];
      const venue = uniqueNames.length === 1
        ? uniqueNames[0]
        : (locs[0].venue || locs[0].addr || '');
      const namesAllSame = uniqueNames.length === 1;
      const rowsHtml = locs.map(loc => {
        const primary = loc.character || loc.name; // 優先顯示 IP，沒有 IP 資料時退回顯示活動名稱
        // 店名都一樣的話，大標題已經顯示過了，選項底下不用再重複顯示同一個店名
        const showSub = !namesAllSame && loc.character && loc.name && loc.name !== primary;
        return `
          <button class="cluster-popup-item" type="button" data-loc-id="${loc.id}">
            <div class="type-badge ${loc.type === '相卡機' ? 'photocard' : 'gacha'}">${MARKER_ICON_SVG[loc.type] || ''}</div>
            <span class="cluster-popup-item-text">
              <span class="cluster-popup-item-name">${primary}</span>
              ${showSub ? `<span class="cluster-popup-item-sub">${loc.name}</span>` : ''}
            </span>
          </button>`;
      }).join('');

      // 清單直接跟著標題一起組成完整字串綁給 bindPopup，
      // Leaflet 從一開始量測到的就是完整內容，寬度才會抓對，也不需要事後再 update()
      marker.bindPopup(`
        <div>
          <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
            <div class="popup-title" style="white-space:nowrap;">${venue}</div>
            <button class="popup-close-btn" style="position:static; flex-shrink:0;" onclick="map.closePopup()">✕</button>
          </div>
          <div class="popup-addr" style="margin-top:8px;margin-bottom:12px;color:var(--fill-gray-64);">目前有 ${locs.length} 台機器</div>
          <div class="cluster-popup-list">${rowsHtml}</div>
        </div>
      `, { maxWidth: 420, autoPan: false, closeButton: false });

      // popupopen 只負責幫已經渲染好的按鈕綁點擊事件，不再碰 innerHTML
      marker.on('popupopen', () => {
        const el = marker.getPopup().getElement();
        if (!el) return;
        el.querySelectorAll('.cluster-popup-item').forEach(btn => {
          if (btn.dataset.bound) return; // 避免同一顆按鈕重複綁定
          btn.dataset.bound = '1';
          btn.addEventListener('click', () => {
            const loc = locs.find(l => String(l.id) === btn.dataset.locId);
            if (!loc) return;
            gtag('event', 'card_click', { machine_id: loc.id, machine_name: loc.name, machine_type: loc.type, source: 'map_cluster_popup' });
            // popup 保持開著，mobile／desktop 一致；mobile 用 sheet 顯示摘要卡，desktop 用側邊欄顯示完整詳情
            if (isMobileMapLayout()) {
              openMobileSheetSummary(loc);
            } else {
              openDesktopSidebar(loc);
            }
          });
        });
      });
    }

    // ---- Desktop：側邊欄固定寬 400 常駐，預設顯示提示文字；點單一 marker，或 cluster popup 清單裡的項目，才會換成詳情 ----
    function openDesktopSidebar(loc) {
      document.getElementById('locationList').innerHTML = buildDetailContentHtml(loc, { compact: false });
      highlightMarker(loc);

    // ---- Mobile：bottom sheet（兩段：摘要卡 / 完整詳情；預設是小 peek + 提示文字，不是真的「無 sheet」）----
    let sheetLevel = 'default';  // 'default' | 'summary' | 'full'
    let sheetLoc = null;         // 目前顯示摘要／完整詳情的那一筆

    function sheetLevelsStack() {
      // 沒選中任何地點時（預設提示文字），handle 一樣可以拖，只是拖上去內容還是提示文字；
      // 選了地點之後才是 summary/full 兩層完整內容
      return sheetLoc ? ['summary', 'full'] : ['default', 'full'];

    function applySheetLevel(level) {
      sheetLevel = level;
      const sidebar = document.querySelector('.sidebar');
      sidebar.style.height = levelHeightPx(level) + 'px';

      if (!sheetLoc) {
        document.getElementById('locationList').innerHTML = `<div class="sidebar-placeholder">點選地圖上的圖示，查看機台詳細資訊</div>`;

        document.getElementById('locationList').innerHTML = buildDetailContentHtml(sheetLoc, { compact: false });

    // 判斷目前是不是走 mobile 地圖版型：跟 CSS 的 640px 斷點對齊，
    // 跟 getDeviceType()（用 pointer:coarse 判斷、給 GA 用）分開，
    // 避免「觸控筆電＋寬螢幕」這種邊界情況兩邊判斷對不上。
    function isMobileMapLayout() {

    // =============================================
    // 🖼️ Google Drive 轉圖片網址
    // =============================================
    function driveUrlToImage(url) {
      if (!url) return '';
      const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if (match) return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w800`;
      if (url.includes('res.cloudinary.com')) {
        return url.replace('/upload/', '/upload/w_800,q_auto,f_auto/');
      }
      return url;
    }

    // =============================================
    // 🔧 解析 CSV 單列
    // =============================================
    function parseCSVRow(row) {
      const result = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < row.length; i++) {
        const char = row[i];
        if (char === '"') { inQuotes = !inQuotes; }
        else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
        else { current += char; }
      }
      result.push(current.trim());
      return result;
    }

    // =============================================
    // 📥 載入 Google Sheet
    // =============================================
    async function loadFromSheet() {
      document.getElementById('grid').innerHTML = '<div class="empty-state">⏳ 載入資料中...</div>';
      try {
        const response = await fetch(SHEET_CSV_URL);
        const csvText = await response.text();
        const rows = csvText.trim().split('\n');

        const firstRow = parseCSVRow(rows[1] || '');
        const lastUpdated = firstRow[15] || '';
        const lastUpdatedText = lastUpdated ? '最後更新：' + lastUpdated : '社群共建 · 持續更新';
        ['lastUpdated', 'listLastUpdated'].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.textContent = lastUpdatedText;
        });

        const locations = rows.slice(1).map(row => {
          const cols = parseCSVRow(row);
          return {
            id:        cols[0] || '',
            type:      (cols[1] || '抽卡機').trim(),
            name:      cols[2] || '',
            venue:     cols[3] || '',
            city:      cols[4] || '',
            addr:      cols[5] || '',
            lat:       parseFloat(cols[6]),
            lng:       parseFloat(cols[7]),
            character: cols[8] || '',
            edition:   cols[9] || '',
            perDraw:   cols[10] || '',
            limited:   cols[11] || '',
            hours:     cols[12] || '',
            image:     cols[13] || '',
            note:      cols[14] || '',
          };
        }).filter(loc => loc.name && !isNaN(loc.lat) && !isNaN(loc.lng));

        allLocations = locations;
        currentFiltered = sortLocations(locations);
        renderGrid(currentFiltered);
        buildFilterOptions(locations);
        renderFilterBar();

        // 偵測分享連結 ?id=xxx
        const urlId = new URLSearchParams(window.location.search).get('id');
        if (urlId) {
          const target = allLocations.find(l => l.id === urlId);
          if (target) {
            const imgs = target.image ? target.image.split(',').map(u => driveUrlToImage(u.trim())).filter(Boolean) : [];
            const googleMapsUrl = `https://www.google.com/maps/search/?api=1&query=${target.lat},${target.lng}`;
            openGridModal(target, imgs, googleMapsUrl, 'share_modal');
          }
        }

      } catch (err) {
        console.error('載入失敗：', err);
        document.getElementById('grid').innerHTML =
          '<div class="empty-state">❌ 資料載入失敗<br><small>請確認 Sheet 已設定公開發布</small></div>';
      }
    }

    // =============================================
    // 🔍 排序邏輯（結束日期 / 距離）
    // =============================================
    function getEndDate(limited) {
      if (!limited) return null; // null 代表無期限（常態機）
      const p = limited.split('～');
      return new Date(p[p.length - 1].trim().replace(/\//g, '-'));
    }

    function haversineKm(lat1, lng1, lat2, lng2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function sortLocations(arr) {
      const list = arr.slice();

      if (sortState === 'distance_asc' || sortState === 'distance_desc') {
        if (!userCoords) return list; // 理論上選取距離排序前一定已經拿到座標，這裡是防呆
        list.sort((a, b) => {
          const da = haversineKm(userCoords.lat, userCoords.lng, a.lat, a.lng);
          const db = haversineKm(userCoords.lat, userCoords.lng, b.lat, b.lng);
          return sortState === 'distance_asc' ? da - db : db - da;
        });
        return list;
      }

      // end_date_asc：有結束日期的排前面（近到遠），無期限的常態機永遠排最後，
      // 常態機彼此之間依 IP 名稱排序（數字 → 筆畫 → 英文，跟篩選選項同一套慣例）
      list.sort((a, b) => {
        const ea = getEndDate(a.limited);
        const eb = getEndDate(b.limited);
        if (ea && eb) return ea - eb;
        if (ea && !eb) return -1;
        if (!ea && eb) return 1;
        return (a.character || '').localeCompare(b.character || '', 'zh-Hant');
      });
      return list;
    }

    // =============================================
    // 🔍 搜尋 + 篩選
    // =============================================
    function syncCount(n) {
      document.getElementById('countBadge').textContent = n;

    function applyFilters() {
      const kw = (document.getElementById('searchInput').value || '').trim().toLowerCase();
      currentFiltered = allLocations.filter(loc => {
        const matchFilters = FILTER_CONFIG.every(cfg => {
          const selected = filterState[cfg.key];
          return selected.length === 0 || selected.includes(loc[cfg.field]);
        });
        const matchKw = !kw ||
          loc.name.toLowerCase().includes(kw) ||
          loc.addr.toLowerCase().includes(kw) ||
          loc.city.toLowerCase().includes(kw) ||
          loc.venue.toLowerCase().includes(kw) ||

        return matchFilters && matchKw;
      });
      currentFiltered = sortLocations(currentFiltered);

    function renderOptionsInto(container, cfg) {
      container.innerHTML = '';

    function toggleFilterValue(key, value) {
      const selected = filterState[key];
      const idx = selected.indexOf(value);
      const willSelect = idx === -1;
      if (willSelect) selected.push(value); else selected.splice(idx, 1);

      // GA: filter_click
      gtag('event', 'filter_click', {
        filter_type: key,
        filter_value: value,
        filter_state: willSelect ? 'on' : 'off',
        device: getDeviceType(),
      });

      const cfg = FILTER_CONFIG.find(c => c.key === key);

      // 重新渲染桌面下拉面板的選中狀態
      const panelOptions = document.querySelector(`.filter-panel[data-panel="${key}"] .filter-panel-options`);
      if (panelOptions) {
        renderOptionsInto(panelOptions, cfg);
        fitPanelWidth(panelOptions.closest('.filter-panel'));
      }

      // 若手機 bottom sheet 正顯示同一個類別，也一併更新
      const sheet = document.getElementById('filterSheet');
      if (sheet.dataset.key === key) {
        const sheetOptionsEl = document.getElementById('filterSheetOptions');
        renderOptionsInto(sheetOptionsEl, cfg);
        if (key === 'type') sheetOptionsEl.style.width = '';
        else fitOptionsWidth(sheetOptionsEl);
      }

      refreshPillStates();
      applyFilters();
    }

    // flex-wrap 容器的 fit-content 在規格上是「假裝不換行」去量寬度的，
    // 沒辦法直接撐出「換行後最寬那一列」的寬度，所以改用 JS 量測：
    // 抓每個 chip 換行後的列（用 offsetTop 分組），取最寬那一列的寬度
    // 設成容器寬度，讓 margin:0 auto 能真正把整個區塊置中。
    function fitOptionsWidth(container) {
      container.style.width = '';
      const items = Array.from(container.children);
      if (!items.length) return;
      const rows = new Map();
      items.forEach(item => {
        const top = item.offsetTop;
        if (!rows.has(top)) rows.set(top, []);
        rows.get(top).push(item);
      });
      let maxRowWidth = 0;
      rows.forEach(rowItems => {
        const left = Math.min(...rowItems.map(i => i.offsetLeft));
        const right = Math.max(...rowItems.map(i => i.offsetLeft + i.offsetWidth));
        maxRowWidth = Math.max(maxRowWidth, right - left);
      });
      if (maxRowWidth > 0) container.style.width = Math.ceil(maxRowWidth) + 'px';
    }

    // 桌面 dropdown 面板同樣的問題：width:max-content 對會換行的 flex 容器
    // 是「假裝不換行」去算的，內容一多一定超過 max-width，永遠卡滿 320px，
    // 就算換行後實際只用到一部分寬度也一樣。改用量測換行後實際列寬來設定面板寬度。
    function fitPanelWidth(panelEl) {
      const optionsEl = panelEl.querySelector('.filter-panel-options');
      if (!optionsEl) return;
      const prevDisplay = panelEl.style.display;
      const wasHidden = getComputedStyle(panelEl).display === 'none';
      if (wasHidden) panelEl.style.display = 'block';
      panelEl.style.width = '';

      const items = Array.from(optionsEl.children);
      if (items.length) {
        const rows = new Map();
        items.forEach(item => {
          const top = item.offsetTop;
          if (!rows.has(top)) rows.set(top, []);
          rows.get(top).push(item);
        });
        let maxRowWidth = 0;
        rows.forEach(rowItems => {
          const left = Math.min(...rowItems.map(i => i.offsetLeft));
          const right = Math.max(...rowItems.map(i => i.offsetLeft + i.offsetWidth));
          maxRowWidth = Math.max(maxRowWidth, right - left);
        });
        const cs = getComputedStyle(panelEl);
        const paddingX = parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight);
        if (maxRowWidth > 0) panelEl.style.width = Math.ceil(maxRowWidth + paddingX) + 'px';
      }

      if (wasHidden) panelEl.style.display = prevDisplay;
    }

    function refreshPillStates() {

      const panelOptions = document.querySelector(`.filter-panel[data-panel="${key}"] .filter-panel-options`);

        renderOptionsInto(panelOptions, cfg);
        fitPanelWidth(panelOptions.closest('.filter-panel'));

      const sheet = document.getElementById('filterSheet');
      if (sheet.dataset.key === key) {
        const sheetOptionsEl = document.getElementById('filterSheetOptions');
        renderOptionsInto(sheetOptionsEl, cfg);
        if (key === 'type') sheetOptionsEl.style.width = '';

      applyFilters();

          ${loc.hours ? `<div class="popup-addr">營業時間：${loc.hours}</div>` : ''}
          ${loc.character ? `<div class="popup-addr">IP：${loc.character}</div>` : ''}
          ${loc.edition ? `<div class="popup-addr">彈數：${loc.edition}</div>` : ''}
          ${loc.perDraw ? `<div class="popup-addr">價格與張數：${loc.perDraw}</div>` : ''}
          ${loc.note ? `<div class="popup-addr">備註：${loc.note}</div>` : ''}
        </div>
        <div class="popup-actions">
          <a href="${googleMapsUrl}" target="_blank" class="popup-gmaps-link" onclick="trackGmapsClick('${loc.id}','${source}')"><svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="currentColor"><path d="M480-191q119-107 179.5-197T720-549q0-105-68.5-174T480-792q-103 0-171.5 69T240-549q0 71 60.5 161T480-191Zm-24.5 67.5Q444-128 433-137q-40-35-86.5-82T260-320q-40-54-66-112.5T168-549q0-134 89-224.5T480-864q133 0 222.5 90.5T792-549q0 58-26.5 117t-66 113q-39.5 54-86 100.5T527-137q-11 9-22.5 13.5T480-119q-13 0-24.5-4.5ZM480-552Zm0 164q62-56 88-81t41-44q14-17 20.5-35.5T636-587q0-35-25.5-60.5T550-673q-21 0-40 9t-30 23q-12-14-30.5-23t-39.5-9q-35 0-60.5 25.5T324-587q0 19 6.5 36t20.5 36q16 21 44 48.5t85 78.5Z"/></svg> 在 Google Maps 查看 →</a>
          <button class="popup-share-btn" onclick="shareLocation('${loc.id}','${source}')">分享 <svg xmlns="http://www.w3.org/2000/svg" height="16px" viewBox="0 -960 960 960" width="16px" fill="currentColor"><path d="M648-96q-50 0-85-35t-35-85q0-9 4-29L295-390q-16 14-36.05 22-20.04 8-42.95 8-50 0-85-35t-35-85q0-50 35-85t85-35q23 0 43 8t36 22l237-145q-2-7-3-13.81-1-6.81-1-15.19 0-50 35-85t85-35q50 0 85 35t35 85q0 50-35 85t-85 35q-23 0-43-8t-36-22L332-509q2 7 3 13.81 1 6.81 1 15.19 0 8.38-1 15.19-1 6.81-3 13.81l237 145q16-14 36.05-22 20.04-8 42.95-8 50 0 85 35t35 85q0 50-35 85t-85 35Zm0-72q20.4 0 34.2-13.8Q696-195.6 696-216q0-20.4-13.8-34.2Q668.4-264 648-264q-20.4 0-34.2 13.8Q600-236.4 600-216q0 20.4 13.8 34.2Q627.6-168 648-168ZM216-432q20.4 0 34.2-14 13.8-14 13.8-34t-13.8-34q-13.8-14-34.2-14-20.4 0-34.2 14-13.8 14-13.8 34t13.8 34q13.8 14 34.2 14Zm466-277.8q14-13.8 14-34.2 0-20.4-13.8-34.2Q668.4-792 648-792q-20.4 0-34.2 13.8Q600-764.4 600-744q0 20.4 14 34.2 14 13.8 34 13.8t34-13.8ZM648-216ZM216-480Zm432-264Z"/></svg></button>
        </div>
        ${imgHtml}
      `;
      document.getElementById('gridModal').classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function closeGridModal(e) {
      if (e && e.target !== document.getElementById('gridModal')) return;
      document.getElementById('gridModal').classList.remove('show');
      document.body.style.overflow = '';
    }

    function trackGmapsClick(id, source) {
      gtag('event', 'gmaps_click', {
        machine_id: id,
        source: source,
        device: getDeviceType(),
      });
    }

    function shareLocation(id, source) {
      // 分享出去的連結走 /api/share?id=xxx，讓 LINE/Threads 等平台的爬蟲能讀到
      // 這個機台對應的 og:title/og:description（見 api/share.js）；
      // 真人點進來後，那支 function 會立刻導回這裡（/?id=xxx），使用體驗不變。
      const url = `${window.location.origin}/api/share?id=${id}`;
      // GA: share_click
      gtag('event', 'share_click', { machine_id: id, source: source || 'unknown' });
      if (navigator.share) {
        navigator.share({ title: '抽卡機在哪！Card Radar', url });
      } else {
        navigator.clipboard.writeText(url).then(() => showToast('已複製連結！'));
      }
    }

    function showToast(msg) {
      const t = document.getElementById('share-toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    // =============================================
    // 📋 Bottom Sheet 手勢（mobile 地圖模式）
    // 拖曳 handle 時即時跟手；放開時依拖曳距離判斷停在哪一層。
    // 每次手勢最多移動一層；收到 summary（mini peek）之後再往下滑不會消失，
    // 只有點 X（closeDetailPanel）才會整個收回「預設」狀態。
    // =============================================
    const SHEET_DEFAULT_HEIGHT = 80; // default（提示文字）：handle(~36px) + 上下各 20px padding + 一行文字
    const SHEET_MINI_HEIGHT = 100;   // summary（收合摘要卡）的固定高度

    function levelHeightPx(level) {
      if (level === 'default') return SHEET_DEFAULT_HEIGHT;
      if (level !== 'full') return SHEET_MINI_HEIGHT;
      // 完整展開最高只能頂到篩選列下緣，不能蓋住搜尋框／篩選器
      const filterBar = document.getElementById('filterBar');
      const topLimit = filterBar ? filterBar.getBoundingClientRect().bottom + 8 : window.innerHeight * 0.3;
      return Math.max(window.innerHeight - topLimit, window.innerHeight * 0.4);
    }

    function initBottomSheet() {
      const sidebar = document.querySelector('.sidebar');
      const handle = document.querySelector('.sheet-handle');
      if (!handle || handle.dataset.sheetInit) return;
      handle.dataset.sheetInit = '1';

      let startY = 0;
      let startHeight = 0;

      handle.addEventListener('touchstart', function(e) {
        startY = e.touches[0].clientY;
        startHeight = sidebar.getBoundingClientRect().height;
        sidebar.style.transition = 'none';
      }, { passive: true });

      handle.addEventListener('touchmove', function(e) {
        const dy = startY - e.touches[0].clientY;
        const levels = sheetLevelsStack();
        const minH = levelHeightPx(levels[0]);
        const maxH = levelHeightPx('full');
        const newHeight = Math.min(Math.max(startHeight + dy, minH), maxH);
        sidebar.style.height = newHeight + 'px';
      }, { passive: true });

      handle.addEventListener('touchend', function(e) {
        sidebar.style.transition = '';
        const dy = startY - e.changedTouches[0].clientY;
        const levels = sheetLevelsStack();
        const curIdx = levels.indexOf(sheetLevel);
        let nextIdx = curIdx;
        if (dy > 50 && curIdx < levels.length - 1) nextIdx = curIdx + 1;      // 往上滑：展開一層
        else if (dy < -50 && curIdx > 0) nextIdx = curIdx - 1;               // 往下滑：收合一層（不會低於清單/摘要層）
        applySheetLevel(levels[nextIdx]);
        if (nextIdx !== curIdx) {
          gtag('event', 'sheet_toggle', { state: levels[nextIdx] }); // GA：只在真正拖拉造成狀態改變時記錄
        }
      });
    }


    function openLightbox(src, machineId) {
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightbox').classList.add('show');
      // GA: lightbox_open
      gtag('event', 'lightbox_open', {
        machine_id: machineId || null,
        device: getDeviceType(),
      });
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('show');
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    // GA: report_click（所有回報表單連結）
    document.querySelectorAll('.report-link').forEach(link => {
      link.addEventListener('click', () => {
        gtag('event', 'report_click');
      });
    });

    // =============================================
    // 👣 訪客計數
    // =============================================
    async function loadVisitorCount() {
      try {
        const res = await fetch('https://api.counterapi.dev/v1/cardradartw/visits/up');
        const data = await res.json();
        document.getElementById('visitorCount').textContent = data.count.toLocaleString('zh-TW');
        document.getElementById('visitorBanner').style.display = 'flex';
      } catch (e) {
        // API 失敗時靜默隱藏 banner
      }
    }
    loadVisitorCount();

    // =============================================
    // 📲 A2HS（加到主畫面）Banner
    // 顯示時機（iOS / Android 共用同一套判斷，不再各自用「瀏覽器事件」或「固定延遲」決定）：
    //   累計點擊「查看詳情」（grid 詳情 or 地圖 marker）達 3 次（跨造訪永久累計，存 localStorage）
    //   或 單次瀏覽停留超過 20 秒
    //   兩者達成其一即可
    // 平台差異只影響「達成門檻後要顯示什麼內容」：
    // - Android：按鈕觸發原生安裝流程（但技術上仍需等瀏覽器發出 beforeinstallprompt 事件才能真的呼叫，
    //   這點無法繞過；如果門檻已達成但事件還沒來，就先不顯示，事件一到馬上顯示）
    // - iOS + Safari：純教學文案，按鈕與 X 都只是關閉
    // - iOS + 非 Safari（LINE / IG / FB 內嵌瀏覽器）：先引導「用 Safari 開啟」
    // 關閉次數 + 時間戳記做退避，避免同一裝置被一直打擾（localStorage 遺失也不會造成體驗災難）
    // =============================================
    (function () {
      const DISMISS_KEY = 'a2hsDismiss';
      const VIEWS_KEY = 'a2hsCardViews';
      const MAX_DISMISS = 3;       // 關過 3 次後永久不再顯示
      const COOLDOWN_DAYS = 14;    // 每次關閉後至少間隔 14 天才再問一次
      const VIEW_THRESHOLD = 3;    // 累計查看詳情次數門檻
      const DWELL_MS = 20000;      // 單次瀏覽停留門檻（20 秒）

      function getDismissData() {
        try { return JSON.parse(localStorage.getItem(DISMISS_KEY) || '{}'); }
        catch (e) { return {}; }
      }
      function recordDismiss() {
        const data = getDismissData();
        const count = (data.count || 0) + 1;
        try {
          localStorage.setItem(DISMISS_KEY, JSON.stringify({ count, lastDismissed: Date.now() }));
        } catch (e) { /* localStorage 不可用時靜默失敗，最壞情況只是多顯示幾次 */ }
      }
      function shouldShow() {
        const data = getDismissData();
        if (!data.count) return true;
        if (data.count >= MAX_DISMISS) return false;
        const daysSince = (Date.now() - (data.lastDismissed || 0)) / 86400000;
        return daysSince > COOLDOWN_DAYS;
      }
      function isStandalone() {
        return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
      }
      function getCumulativeViews() {
        try { return parseInt(localStorage.getItem(VIEWS_KEY) || '0', 10) || 0; }
        catch (e) { return 0; }
      }
      function bumpCumulativeViews() {
        const next = getCumulativeViews() + 1;
        try { localStorage.setItem(VIEWS_KEY, String(next)); } catch (e) { /* 最壞情況只是這次沒記到 */ }
        return next;
      }

      const ua = navigator.userAgent.toLowerCase();
      const isIos = /iphone|ipad|ipod/.test(ua);
      const isAndroid = /android/.test(ua);
      const isInAppBrowser = /line|instagram|fban|fbav|micromessenger/.test(ua);
      // crios/fxios/edgios = iOS 上的 Chrome/Firefox/Edge（外殼是 Safari 引擎但不是真的 Safari App）
      const isSafari = /safari/.test(ua) && !/crios|fxios|edgios/.test(ua) && !isInAppBrowser;

      let deferredPrompt = null;
      let engagementMet = false;
      let bannerShownOnce = false;
      let installedViaBanner = false; // 記錄這次安裝是不是透過我們的 banner 按鈕促成的，appinstalled 觸發時要用
      const banner = document.getElementById('a2hsBanner');
      const desc = document.getElementById('a2hsDesc');
      const actionBtn = document.getElementById('a2hsAction');
      const closeBtn = document.getElementById('a2hsClose');

      function dismiss(reason) {
        banner.classList.remove('show');
        recordDismiss();
        gtag('event', 'a2hs_banner_dismissed', { reason: reason || 'close' });
      }

      function showBanner(platform) {
        banner.classList.add('show');
        gtag('event', 'a2hs_banner_shown', { platform });
      }

      function renderForPlatform() {
        if (isAndroid) {
          desc.textContent = '下次找機台不用再開瀏覽器，點一下就開啟！';
          actionBtn.textContent = '加到主畫面';
          actionBtn.onclick = async () => {
            banner.classList.remove('show');
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            gtag('event', 'a2hs_prompt_result', { outcome, platform: 'android' });
            if (outcome === 'accepted') installedViaBanner = true;
            deferredPrompt = null;
          };
          showBanner('android');
        } else if (isIos && !isSafari) {
          desc.textContent = '在 Safari 開啟網頁 → 「⋯」→ 分享 → 加入主畫面，下次找機台不用再開瀏覽器，點一下就開啟！';
          actionBtn.textContent = '我知道了';
          actionBtn.onclick = () => dismiss('ack');
          showBanner('ios_in_app');
        } else if (isIos && isSafari) {
          desc.textContent = '點擊「⋯」→ 分享 → 加入主畫面，下次找機台不用再開瀏覽器，點一下就開啟！';
          actionBtn.textContent = '我知道了';
          actionBtn.onclick = () => dismiss('ack');
          showBanner('ios_safari');
        }
        // 其他平台（桌機等）不顯示
      }

      function tryTrigger() {
        if (bannerShownOnce) return;
        if (isStandalone() || !shouldShow() || !banner) return;
        if (!engagementMet) return;
        if (!isAndroid && !isIos) return;               // 桌機等其他平台不顯示
        if (isAndroid && !deferredPrompt) return;        // Android 仍須等瀏覽器把安裝事件準備好，才有東西可觸發
        bannerShownOnce = true;
        renderForPlatform();
      }

      function markEngaged(reason) {
        if (engagementMet) return;
        engagementMet = true;
        gtag('event', 'a2hs_engagement_met', {
          reason,
          platform: isAndroid ? 'android' : (isIos ? 'ios' : 'other'),
        });
        tryTrigger();
      }

      // 條件一：累計點擊「查看詳情」次數（跨造訪永久累計）
      window.a2hsRecordCardView = function () {
        const total = bumpCumulativeViews();
        if (total >= VIEW_THRESHOLD) markEngaged('cumulative_views');
      };
      if (getCumulativeViews() >= VIEW_THRESHOLD) markEngaged('cumulative_views'); // 這次進站前就已經累計達標

      // 條件二：本次瀏覽停留超過門檻秒數
      setTimeout(() => markEngaged('dwell_time'), DWELL_MS);

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        tryTrigger(); // 事件來的時候，如果互動門檻早就達成了，馬上顯示
      });
      window.addEventListener('appinstalled', () => {
        banner.classList.remove('show');
        gtag('event', 'pwa_installed', {
          platform: isAndroid ? 'android' : (isIos ? 'ios' : 'other'),
          source: installedViaBanner ? 'a2hs_banner' : 'native_browser_ui',
        });
      });
      closeBtn?.addEventListener('click', () => dismiss('close_x'));
    })();

    // =============================================
    // ⚙️ Service Worker 註冊（PWA 離線快取）
    // =============================================
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch((err) => {
          console.warn('Service worker 註冊失敗：', err);
        });
      });
    }

    // GA：這次是用已安裝的 PWA（standalone）打開，還是一般瀏覽器 —— 用來驗證安裝後有沒有真的被回訪使用
    gtag('event', 'pwa_launch_mode', {
      mode: (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true)
        ? 'standalone' : 'browser',
    });

    // 初始化
    setView('grid');
    loadFromSheet();
  </script>
</body>
</html>
