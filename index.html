<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>抽卡機在哪！Card Radar</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-29PN14JRK8"></script>
  <script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-1G91M8FLWQ');
  </script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --pink:   #ff4d8d;
      --yellow: #ffcf48;
      --dark:   #1C1C1E;
      --mid:    #2C2C2E;
      --card:   #3A3A3C;
      --white:  #f0eeff;
      --grey:   #8892b0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--dark);
      color: var(--white);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== Header ===== */
    header {
      background: var(--mid);
      border-bottom: 2px solid var(--pink);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 200;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { font-size: 26px; animation: spin 4s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .logo h1 { font-size: 20px; font-weight: 900; letter-spacing: 1px; }
    .logo h1 span { color: var(--yellow); }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .header-info { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--grey); }

    /* View Toggle */
    .view-toggle {
      display: flex;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      overflow: hidden;
    }
    .view-btn {
      padding: 6px 16px;
      font-size: 13px;
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 700;
      background: none; border: none;
      color: var(--grey); cursor: pointer;
      transition: background 0.18s, color 0.18s;
      display: flex; align-items: center; gap: 5px;
    }
    .view-btn:hover { color: var(--white); }
    .view-btn.active { background: var(--pink); color: #fff; }

    /* ===== Toolbar ===== */
    .toolbar {
      background: var(--mid);
      border-bottom: 1px solid rgba(255,77,141,0.15);
      padding: 10px 24px;
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
    }
    .search-box {
      display: flex; align-items: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,77,141,0.35);
      border-radius: 8px; padding: 7px 14px; gap: 8px;
      flex: 1; max-width: 360px;
    }
    .search-box input {
      background: none; border: none; outline: none;
      color: var(--white); font-family: 'Noto Sans TC', sans-serif;
      font-size: 14px; width: 100%;
    }
    .search-box input::placeholder { color: var(--grey); }
    .count-badge { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--grey); white-space: nowrap; margin-left: auto; }
    .count-badge strong { color: var(--pink); font-size: 16px; }

    /* ===== Content ===== */
    .content { flex: 1; overflow: hidden; display: flex; }

    /* ===== Grid View ===== */
    #gridView {
      width: 100%; height: 100%; overflow-y: auto; padding: 24px;
      display: none;
    }
    #gridView.active { display: block; }
    #gridView::-webkit-scrollbar { width: 5px; }
    #gridView::-webkit-scrollbar-thumb { background: var(--pink); border-radius: 4px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    /* ===== Grid cards ===== */
    .loc-card-grid {
      background: var(--card);
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.06);
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      display: flex; flex-direction: column;
    }
    .loc-card-grid:hover {
      border-color: #ffcf48;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .card-top { padding: 16px; display: flex; flex-direction: column; gap: 4px; }
    .card-name { font-weight: 700; font-size: 14px; line-height: 1.35; margin-bottom: 4px; }
    .card-limited { font-size: 12px; color: var(--yellow); font-weight: 700; margin-bottom: 2px; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
    .tag {
      font-size: 11px; padding: 2px 8px; border-radius: 20px;
      background: rgba(255,77,141,0.15); color: var(--pink);
      border: 1px solid rgba(255,77,141,0.3);
    }
    .card-actions { padding: 0 16px 14px; display: flex; align-items: center; gap: 8px; margin-top: auto; }
    .btn-gmaps {
      display: inline-flex; align-items: center; gap: 5px;
      color: var(--yellow); font-size: 13px; font-weight: 400;
      font-family: 'Noto Sans TC', sans-serif;
      text-decoration: underline; text-underline-offset: 3px;
      background: none; border: none; padding: 0;
      transition: opacity 0.2s; white-space: nowrap;
    }
    .btn-gmaps:hover { opacity: 0.75; }
    .btn-expand {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 7px 14px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; color: var(--grey); font-size: 12px;
      font-family: 'Noto Sans TC', sans-serif; cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      margin-left: auto;
    }
    .btn-expand:hover { background: rgba(255,77,141,0.1); border-color: rgba(255,77,141,0.3); color: var(--pink); }
    .btn-expand.open { color: var(--pink); border-color: rgba(255,77,141,0.3); background: rgba(255,77,141,0.08); }
    .chevron { display: inline-block; transition: transform 0.25s; font-style: normal; }
    .btn-expand.open .chevron { transform: rotate(180deg); }

    .card-detail { overflow: hidden; transition: max-height 0.35s ease; border-top: 1px solid transparent; }
    .card-detail.open { border-top-color: rgba(255,255,255,0.06); }
    .card-detail-inner { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 8px; }
    .detail-row { display: flex; gap: 8px; font-size: 13px; align-items: flex-start; }
    .detail-icon { flex-shrink: 0; font-size: 14px; margin-top: 1px; }
    .detail-text { color: var(--grey); line-height: 1.5; }

    /* Grid carousel */
    .carousel-grid { margin-top: 4px; background: rgba(255,255,255,0.04); border-radius: 10px; overflow: hidden; }
    .carousel-grid-img-wrap { width: 100%; aspect-ratio: 4/3; background: #222; display: flex; align-items: center; justify-content: center; }
    .carousel-grid-img { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; display: block; }
    .carousel-controls-grid { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 8px; }
    .single-img-wrap { margin-top: 4px; border-radius: 10px; overflow: hidden; aspect-ratio: 4/3; }
    .single-img-wrap img { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; display: block; }

    /* ===== Map View ===== */
    #mapView { width: 100%; height: 100%; display: none; }
    #mapView.active { display: flex; }

    /* ===== Sidebar (原始版樣式) ===== */
    .sidebar {
      width: 280px;
      background: var(--mid);
      border-right: 1px solid rgba(255,77,141,0.2);
      display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
    }
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .sidebar-header h2 {
      font-size: 13px; color: var(--grey);
      text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px;
    }
    .location-list { flex: 1; overflow-y: auto; padding: 8px; }
    .location-list::-webkit-scrollbar { width: 4px; }
    .location-list::-webkit-scrollbar-track { background: transparent; }
    .location-list::-webkit-scrollbar-thumb { background: var(--pink); border-radius: 4px; }

    /* Sidebar card (原始版) */
    .loc-card {
      background: var(--card);
      border-radius: 10px; padding: 12px; margin-bottom: 8px;
      cursor: pointer; border: 1px solid transparent;
      transition: border-color 0.2s, transform 0.15s;
    }
    .loc-card:hover { border-color: var(--pink); transform: translateX(3px); }
    .loc-card.active { border-color: var(--yellow); }
    .loc-name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
    .loc-limited { font-size: 12px; color: var(--yellow); font-weight: 700; margin-bottom: 6px; }
    .loc-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .loc-tags .tag { font-size: 11px; padding: 2px 8px; }

    /* Map */
    #map { flex: 1; }
    .mobile-map-search { display: none; }

    /* ===== Leaflet popup (原始版) ===== */
    .leaflet-popup-content-wrapper {
      background: #1c1c1e; color: var(--white);
      border: 1px solid #ffcf48; border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .leaflet-popup-tip { background: var(--mid); }
    .popup-title { font-weight: 900; font-size: 16px; margin-bottom: 6px; color: var(--yellow); }
    .popup-addr { font-size: 13px; color: var(--grey); margin-bottom: 8px; }
    .popup-limited {
      display: inline-block; padding: 6px 12px;
      background: #1c1c1e; border: 1px solid #ffcf48;
      border-radius: 15px; color: #ffcf48; font-size: 12px; font-weight: 400;
    }
    .popup-img-wrap {
      background: rgba(120,125,128,0.2); border-radius: 8px;
      padding: 16px; margin: 12px 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .popup-img { width: 100%; height: auto; border-radius: 8px; display: block; cursor: zoom-in; }
    .popup-gmaps-link {
      display: block; margin-top: 10px; color: #ffcf48;
      font-size: 12px; font-weight: 400; text-decoration: underline; transition: opacity 0.2s;
    }
    .popup-gmaps-link:hover { opacity: 0.75; }

    /* Popup carousel */
    .carousel { margin-bottom: 4px; }
    .carousel-img-wrap { display: flex; align-items: center; justify-content: center; }
    .carousel-controls { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 8px; }
    .carousel-btn {
      background: #ffcf48; color: #1c1c1e; border: none; border-radius: 50%;
      width: 20px; height: 20px; min-width: 20px; font-size: 14px; font-weight: bold;
      line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: opacity 0.2s; padding: 0;
    }
    .carousel-btn:hover { opacity: 0.8; }
    .carousel-counter { font-size: 12px; color: var(--white); min-width: 32px; text-align: center; }

    /* ===== Lightbox ===== */
    .lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.9); z-index: 99999;
      align-items: center; justify-content: center; cursor: zoom-out;
    }
    .lightbox.show { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 8px; }

    /* ===== Grid Detail Modal ===== */
    .grid-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 9999;
      align-items: center; justify-content: center;
      padding: 20px;
    }
    .grid-modal-overlay.show { display: flex; }
    .grid-modal-box {
      background: #1c1c1e; border: 1px solid #ffcf48;
      border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      width: 100%; max-width: 420px; max-height: 90vh;
      overflow-y: auto; position: relative; padding: 20px;
    }
    .grid-modal-close {
      position: absolute; top: 12px; right: 14px;
      background: none; border: none; color: var(--grey);
      font-size: 18px; cursor: pointer; line-height: 1;
    }
    .grid-modal-close:hover { color: var(--white); }
    .grid-modal-content .popup-title { padding-right: 24px; }

    /* ===== Empty ===== */
    .empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--grey); font-size: 15px; }

    /* ===== Mobile ===== */
    @media (max-width: 640px) {
      .logo h1 { font-size: 16px; }
      .header-info { display: none; }
      #gridView { padding: 12px; }
      .grid { grid-template-columns: 1fr; gap: 12px; }
      .toolbar { padding: 8px 12px; }
      .view-btn .label { display: none; }

      /* 地圖模式：上地圖下列表 */
      #mapView {
        flex-direction: column;
        position: relative;
      }
      #map {
        flex: none;
        height: 55vh;
        order: -1;
      }
      .sidebar {
        width: 100%;
        border-right: none;
        border-top: 2px solid var(--pink);
        height: calc(45vh);
        flex-direction: column;
        overflow: hidden;
      }
      .sidebar-header { padding: 10px 16px 6px; }
      .mobile-map-search {
        display: flex;
        align-items: center;
        background: rgba(142,142,147,0.2);
        border-radius: 19px;
        padding: 8px 16px; gap: 8px;
        margin: 0 12px 8px;
      }
      .mobile-map-search input {
        background: none; border: none; outline: none;
        color: var(--white); font-family: 'Noto Sans TC', sans-serif;
        font-size: 13px; width: 100%;
      }
      .mobile-map-search input::placeholder { color: var(--grey); }
      .location-list { padding: 0 8px 8px; }
      .mobile-count-badge { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--grey); white-space: nowrap; }
      .mobile-count-badge strong { color: var(--pink); font-size: 13px; }
      body.map-view .toolbar { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <span class="logo-icon">🎰</span>
      <h1>抽卡機在哪！<span>Card Radar</span></h1>
    </div>
    <div class="header-right">
      <div class="header-info" id="lastUpdated">載入中...</div>
      <div class="view-toggle">
        <button class="view-btn" id="btnGrid" onclick="setView('grid')">☰ <span class="label">列表</span></button>
        <button class="view-btn" id="btnMap" onclick="setView('map')">🗺 <span class="label">地圖</span></button>
      </div>
    </div>
  </header>

  <div class="toolbar">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="搜尋 IP、縣市、場地..." />
    </div>
    <div class="count-badge"><strong id="countBadge">0</strong> 個地點</div>
  </div>

  <div class="content">
    <!-- Grid View -->
    <div id="gridView">
      <div class="grid" id="grid">
        <div class="empty-state">⏳ 載入資料中...</div>
      </div>
    </div>

    <!-- Map View -->
    <div id="mapView">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>地點列表</h2>
        </div>
        <div class="mobile-map-search">
          <span>🔍</span>
          <input type="text" id="mapSearchInput" placeholder="搜尋 IP 或縣市..." />
          <div class="mobile-count-badge"><strong id="mobileCountBadge">0</strong> 個地點</div>
        </div>
        <div class="location-list" id="locationList"></div>
      </aside>
      <div id="map"></div>
    </div>
  </div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightboxImg" src="" />
  </div>

  <!-- Grid Detail Modal -->
  <div class="grid-modal-overlay" id="gridModal" onclick="closeGridModal(event)">
    <div class="grid-modal-box">
      <button class="grid-modal-close" onclick="closeGridModal()">✕</button>
      <div class="grid-modal-content" id="gridModalContent"></div>
    </div>
  </div>

  <script>
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQgBZrLfJlb-JY9YGm3o9vX5w3jG9hojq5E79tStxW1g89rKpuMnaRi1vA833KmZbilAAv9vrhttqQh/pub?gid=0&single=true&output=csv';

    let allLocations = [];
    let currentFiltered = [];
    let map = null;
    let markers = [];

    const customIcon = L.divIcon({
      html: '🎰', className: '',
      iconSize: [52, 52], iconAnchor: [26, 26], popupAnchor: [0, -26]
    });

    // =============================================
    // 🗺️ 切換視圖
    // =============================================
    function setView(view) {
      document.getElementById('btnGrid').classList.toggle('active', view === 'grid');
      document.getElementById('btnMap').classList.toggle('active', view === 'map');
      document.getElementById('gridView').classList.toggle('active', view === 'grid');
      document.getElementById('mapView').classList.toggle('active', view === 'map');
      document.body.classList.toggle('map-view', view === 'map');

      if (view === 'map') {
        initMap();
        setTimeout(() => { if (map) map.invalidateSize(); }, 50);
      }
    }

    // =============================================
    // 🗺️ 初始化地圖（只一次）
    // =============================================
    function initMap() {
      if (map) return;
      map = L.map('map').setView([23.6, 121.0], 8);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors', maxZoom: 19
      }).addTo(map);
      delete L.Icon.Default.prototype._getIconUrl;
      L.Icon.Default.mergeOptions({
        iconRetinaUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png',
        iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
        shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
      });
      renderMapLocations(currentFiltered.length ? currentFiltered : allLocations);
    }

    // =============================================
    // 📍 渲染地圖 markers + 側邊欄（原始版邏輯）
    // =============================================
    function renderMapLocations(data) {
      if (!map) return;
      markers.forEach(m => map.removeLayer(m));
      markers = [];

      const list = document.getElementById('locationList');
      list.innerHTML = '';

      if (data.length === 0) {
        list.innerHTML = '<div style="padding:20px;color:var(--grey);text-align:center;">找不到符合的地點</div>';
        return;
      }

      data.forEach((loc, i) => {
        const googleMapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc.city + loc.addr)}`;
        const imgs = loc.image
          ? loc.image.split(',').map(s => driveUrlToImage(s.trim())).filter(Boolean)
          : [];

        // 圖片 HTML（原始版 popup 樣式）
        let imgHtml = '';
        if (imgs.length === 1) {
          imgHtml = `<div class="popup-img-wrap"><img src="${imgs[0]}" class="popup-img" data-lightbox="${imgs[0]}" /></div>`;
        } else if (imgs.length > 1) {
          const cid = 'map-carousel-' + i;
          imgHtml = `
            <div class="popup-img-wrap">
              <div class="carousel" id="${cid}" data-index="0" data-imgs='${JSON.stringify(imgs)}'>
                <div class="carousel-img-wrap">
                  <img src="${imgs[0]}" class="popup-img carousel-img" data-lightbox="${imgs[0]}" />
                </div>
                <div class="carousel-controls">
                  <button class="carousel-btn" data-carousel-action="prev" data-carousel-id="${cid}">&#8249;</button>
                  <span class="carousel-counter">1 / ${imgs.length}</span>
                  <button class="carousel-btn" data-carousel-action="next" data-carousel-id="${cid}">&#8250;</button>
                </div>
              </div>
            </div>`;
        }

        // Marker + popup（原始版）
        const marker = L.marker([loc.lat, loc.lng], { icon: customIcon })
          .addTo(map)
          .bindPopup(`
            <div class="popup-title">${loc.name}</div>
            ${loc.venue ? `<div class="popup-addr">🏢 ${loc.venue}</div>` : ''}
            <div class="popup-addr">📍 ${loc.addr}</div>
            ${loc.character ? `<div class="popup-addr">⭐ IP：${loc.character}</div>` : ''}
            ${loc.edition ? `<div class="popup-addr">🃏 彈數：${loc.edition}</div>` : ''}
            ${loc.perDraw ? `<div class="popup-addr">🎴 一抽張數：${loc.perDraw}</div>` : ''}
            ${loc.note ? `<div class="popup-addr">📝 ${loc.note}</div>` : ''}
            ${loc.hours ? `<div class="popup-addr">🕐 ${loc.hours}</div>` : ''}
            ${loc.limited ? `<div class="popup-limited">期間限定：${loc.limited}</div>` : ''}
            ${imgHtml}
            <a href="${googleMapsUrl}" target="_blank" class="popup-gmaps-link">在 Google Maps 查看 →</a>
          `);
        markers.push(marker);

        // 側邊欄卡片（原始版）
        const card = document.createElement('div');
        card.className = 'loc-card';
        card.innerHTML = `
          <div class="loc-name">${loc.name}</div>
          ${loc.limited ? `<div class="loc-limited">${loc.limited}</div>` : ''}
          <div class="loc-tags">
            ${loc.character ? `<span class="tag">${loc.character}</span>` : ''}
            ${loc.city ? `<span class="tag">${loc.city}</span>` : ''}
            ${loc.venue ? `<span class="tag">${loc.venue}</span>` : ''}
          </div>
        `;
        card.addEventListener('click', () => {
          document.querySelectorAll('.loc-card').forEach(c => c.classList.remove('active'));
          card.classList.add('active');
          map.flyTo([loc.lat, loc.lng], 15, { duration: 1.2 });
          marker.openPopup();
        });
        list.appendChild(card);
      });
    }

    // =============================================
    // 🖼️ Google Drive 轉圖片網址
    // =============================================
    function driveUrlToImage(url) {
      if (!url) return '';
      const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if (match) return `https://drive.google.com/uc?export=view&id=${match[1]}`;
      return url;
    }

    // =============================================
    // 🔧 解析 CSV 單列
    // =============================================
    function parseCSVRow(row) {
      const result = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < row.length; i++) {
        const char = row[i];
        if (char === '"') { inQuotes = !inQuotes; }
        else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
        else { current += char; }
      }
      result.push(current.trim());
      return result;
    }

    // =============================================
    // 📥 載入 Google Sheet
    // =============================================
    async function loadFromSheet() {
      document.getElementById('grid').innerHTML = '<div class="empty-state">⏳ 載入資料中...</div>';
      try {
        const response = await fetch(SHEET_CSV_URL);
        const csvText = await response.text();
        const rows = csvText.trim().split('\n');

        const firstRow = parseCSVRow(rows[1] || '');
        const lastUpdated = firstRow[13] || '';
        document.getElementById('lastUpdated').textContent =
          lastUpdated ? '最後更新：' + lastUpdated : '社群共建 · 持續更新';

        const locations = rows.slice(1).map(row => {
          const cols = parseCSVRow(row);
          return {
            name:      cols[0] || '',
            venue:     cols[1] || '',
            city:      cols[2] || '',
            addr:      cols[3] || '',
            lat:       parseFloat(cols[4]),
            lng:       parseFloat(cols[5]),
            limited:   cols[6] || '',
            character: cols[7] || '',
            image:     cols[8] || '',
            edition:   cols[9] || '',
            perDraw:   cols[10] || '',
            note:      cols[11] || '',
            hours:     cols[12] || '',
          };
        }).filter(loc => loc.name && !isNaN(loc.lat) && !isNaN(loc.lng));

        locations.sort((a, b) => {
          const getEnd = l => {
            if (!l) return new Date('9999/12/31');
            const p = l.split('～');
            return new Date(p[p.length-1].trim().replace(/\//g, '-'));
          };
          return getEnd(a.limited) - getEnd(b.limited);
        });

        allLocations = locations;
        currentFiltered = locations;
        renderGrid(locations);

      } catch (err) {
        console.error('載入失敗：', err);
        document.getElementById('grid').innerHTML =
          '<div class="empty-state">❌ 資料載入失敗<br><small>請確認 Sheet 已設定公開發布</small></div>';
      }
    }

    // =============================================
    // 🃏 渲染格狀列表
    // =============================================
    function renderGrid(data) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      document.getElementById('countBadge').textContent = data.length;
      document.getElementById('mobileCountBadge').textContent = data.length;

      if (data.length === 0) {
        grid.innerHTML = '<div class="empty-state">找不到符合的地點 😢</div>';
        return;
      }

      data.forEach((loc, i) => {
        const googleMapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc.city + loc.addr)}`;
        const imgs = loc.image
          ? loc.image.split(',').map(s => driveUrlToImage(s.trim())).filter(Boolean)
          : [];

        const cid = 'grid-c-' + i;
        let imageHtml = '';
        if (imgs.length === 1) {
          imageHtml = `<div class="single-img-wrap"><img src="${imgs[0]}" data-lightbox="${imgs[0]}" loading="lazy"/></div>`;
        } else if (imgs.length > 1) {
          imageHtml = `
            <div class="carousel-grid" id="${cid}" data-index="0" data-imgs='${JSON.stringify(imgs)}'>
              <div class="carousel-grid-img-wrap">
                <img src="${imgs[0]}" class="carousel-grid-img" data-lightbox="${imgs[0]}" loading="lazy"/>
              </div>
              <div class="carousel-controls-grid">
                <button class="carousel-btn" data-grid-action="prev" data-grid-cid="${cid}">&#8249;</button>
                <span class="carousel-counter" style="color:var(--grey)">1 / ${imgs.length}</span>
                <button class="carousel-btn" data-grid-action="next" data-grid-cid="${cid}">&#8250;</button>
              </div>
            </div>`;
        }

        const hasDetail = loc.addr || loc.edition || loc.perDraw || loc.hours || loc.note || imgs.length > 0;
        let detailHtml = '';
        if (loc.addr) detailHtml += `<div class="detail-row"><span class="detail-icon">📍</span><span class="detail-text">${loc.city}${loc.addr}</span></div>`;
        if (loc.hours) detailHtml += `<div class="detail-row"><span class="detail-icon">🕐</span><span class="detail-text">${loc.hours}</span></div>`;
        if (loc.edition || loc.perDraw) {
          const t = [loc.edition ? `彈數：${loc.edition}` : '', loc.perDraw ? `一抽：${loc.perDraw}張` : ''].filter(Boolean).join('　');
          detailHtml += `<div class="detail-row"><span class="detail-icon">🃏</span><span class="detail-text">${t}</span></div>`;
        }
        if (loc.note) detailHtml += `<div class="detail-row"><span class="detail-icon">📝</span><span class="detail-text">${loc.note}</span></div>`;
        if (imageHtml) detailHtml += imageHtml;

        const card = document.createElement('div');
        card.className = 'loc-card-grid';
        card.innerHTML = `
          <div class="card-top">
            <div class="card-name">${loc.name}</div>
            ${loc.limited ? `<div class="card-limited">${loc.limited}</div>` : ''}
            <div class="card-tags">
              ${loc.character ? `<span class="tag">${loc.character}</span>` : ''}
              ${loc.city ? `<span class="tag">${loc.city}</span>` : ''}
              ${loc.venue ? `<span class="tag">${loc.venue}</span>` : ''}
            </div>
          </div>
          <div class="card-actions">
            <a href="${googleMapsUrl}" target="_blank" class="btn-gmaps">🗺️ 在 Google Maps 查看 →</a>
            ${hasDetail ? `<button class="btn-expand" type="button">詳情 <i class="chevron">▾</i></button>` : ''}
          </div>
        `;

        if (hasDetail) {
          const btn = card.querySelector('.btn-expand');
          btn.addEventListener('click', function(e) {
            e.stopPropagation();
            openGridModal(loc, imgs, googleMapsUrl);
          });
        }

        grid.appendChild(card);
      });
    }

    // =============================================
    // 🔍 搜尋
    // =============================================
    function syncCount(n) {
      document.getElementById('countBadge').textContent = n;
      document.getElementById('mobileCountBadge').textContent = n;
    }

    function handleSearch(kw) {
      kw = kw.trim().toLowerCase();
      currentFiltered = allLocations.filter(loc =>
        loc.name.toLowerCase().includes(kw) ||
        loc.addr.toLowerCase().includes(kw) ||
        loc.city.toLowerCase().includes(kw) ||
        loc.venue.toLowerCase().includes(kw) ||
        loc.character.toLowerCase().includes(kw) ||
        loc.edition.toLowerCase().includes(kw)
      );
      renderGrid(currentFiltered);
      syncCount(currentFiltered.length);
      if (map) renderMapLocations(currentFiltered);
    }

    document.getElementById('searchInput').addEventListener('input', function () {
      handleSearch(this.value);
    });
    document.getElementById('mapSearchInput').addEventListener('input', function () {
      handleSearch(this.value);
    });

    // =============================================
    // 🖱️ 事件委派（輪播、Lightbox）
    // =============================================
    document.addEventListener('click', function (e) {
      // Grid carousel
      const gridBtn = e.target.closest('[data-grid-action]');
      if (gridBtn) {
        e.stopPropagation();
        const action = gridBtn.getAttribute('data-grid-action');
        const cid = gridBtn.getAttribute('data-grid-cid');
        const el = document.getElementById(cid);
        if (!el) return;
        const imgs = JSON.parse(el.getAttribute('data-imgs'));
        let idx = parseInt(el.getAttribute('data-index'));
        idx = action === 'prev' ? (idx - 1 + imgs.length) % imgs.length : (idx + 1) % imgs.length;
        el.setAttribute('data-index', idx);
        const img = el.querySelector('.carousel-grid-img');
        img.src = imgs[idx];
        img.setAttribute('data-lightbox', imgs[idx]);
        el.querySelector('.carousel-counter').textContent = (idx + 1) + ' / ' + imgs.length;
        return;
      }

      // Lightbox（grid）
      const lb = e.target.closest('[data-lightbox]');
      if (lb && !e.target.closest('.leaflet-popup-content')) {
        openLightbox(lb.getAttribute('data-lightbox') || lb.src);
        return;
      }
    });

    // Map popup: carousel + lightbox（capture mode，原始版）
    document.addEventListener('click', function(e) {
      const btn = e.target.closest('[data-carousel-action]');
      if (btn) {
        e.stopPropagation(); e.preventDefault();
        const action = btn.getAttribute('data-carousel-action');
        const id = btn.getAttribute('data-carousel-id');
        const el = document.getElementById(id);
        if (!el) return;
        const imgs = JSON.parse(el.getAttribute('data-imgs'));
        let idx = parseInt(el.getAttribute('data-index'));
        idx = action === 'prev' ? (idx - 1 + imgs.length) % imgs.length : (idx + 1) % imgs.length;
        el.setAttribute('data-index', idx);
        const img = el.querySelector('.carousel-img');
        img.src = imgs[idx];
        img.setAttribute('data-lightbox', imgs[idx]);
        el.querySelector('.carousel-counter').textContent = (idx + 1) + ' / ' + imgs.length;
        return;
      }
      // Lightbox（popup）
      const img = e.target.closest('[data-lightbox]');
      if (img && e.target.closest('.leaflet-popup-content')) {
        e.stopPropagation(); e.preventDefault();
        const carouselImg = img.classList.contains('carousel-img') ? img : (img.querySelector('.carousel-img') || img);
        openLightbox(carouselImg.src);
        return;
      }
    }, true);

    function openGridModal(loc, imgs, googleMapsUrl) {
      const mid = 'modal-carousel';
      let imgHtml = '';
      if (imgs.length === 1) {
        imgHtml = `<div class="popup-img-wrap"><img src="${imgs[0]}" class="popup-img" data-lightbox="${imgs[0]}" /></div>`;
      } else if (imgs.length > 1) {
        imgHtml = `
          <div class="popup-img-wrap">
            <div class="carousel" id="${mid}" data-index="0" data-imgs='${JSON.stringify(imgs)}'>
              <div class="carousel-img-wrap">
                <img src="${imgs[0]}" class="carousel-img popup-img" data-lightbox="${imgs[0]}" />
              </div>
              <div class="carousel-controls">
                <button class="carousel-btn" data-carousel-action="prev" data-carousel-id="${mid}">&#8249;</button>
                <span class="carousel-counter">${1} / ${imgs.length}</span>
                <button class="carousel-btn" data-carousel-action="next" data-carousel-id="${mid}">&#8250;</button>
              </div>
            </div>
          </div>`;
      }

      document.getElementById('gridModalContent').innerHTML = `
        <div class="popup-title">${loc.name}</div>
        ${loc.venue ? `<div class="popup-addr">🏢 ${loc.venue}</div>` : ''}
        ${loc.addr ? `<div class="popup-addr">📍 ${loc.city}${loc.addr}</div>` : ''}
        ${loc.character ? `<div class="popup-addr">⭐ IP：${loc.character}</div>` : ''}
        ${loc.edition ? `<div class="popup-addr">🃏 彈數：${loc.edition}</div>` : ''}
        ${loc.perDraw ? `<div class="popup-addr">🎴 一抽張數：${loc.perDraw}</div>` : ''}
        ${loc.hours ? `<div class="popup-addr">🕐 ${loc.hours}</div>` : ''}
        ${loc.note ? `<div class="popup-addr">📝 ${loc.note}</div>` : ''}
        ${loc.limited ? `<div class="popup-limited" style="margin:8px 0;display:inline-block">期間限定：${loc.limited}</div>` : ''}
        ${imgHtml}
        <a href="${googleMapsUrl}" target="_blank" class="popup-gmaps-link">在 Google Maps 查看 →</a>
      `;
      document.getElementById('gridModal').classList.add('show');
    }

    function closeGridModal(e) {
      if (e && e.target !== document.getElementById('gridModal')) return;
      document.getElementById('gridModal').classList.remove('show');
    }

    function openLightbox(src) {
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightbox').classList.add('show');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('show');
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    // 初始化
    setView('grid');
    loadFromSheet();
  </script>

</body>
