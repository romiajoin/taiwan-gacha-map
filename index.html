  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    :root {
      --fill-blue:     #0066FF;
      --fill-orange:   #EA580C; 
      --fill-green:    #16A34A;
      --fill-black:    #000000;
      --fill-white:    #FFFFFF;
      --fill-gray:     #3C3C43;
      --fill-gray5:    #E5E5EA;
      --fill-gray6:    #F2F2F7;
      --fill-gray-8:   rgba(28,28,28,0.08);
      --fill-gray-16:  rgba(28,28,28,0.16);
      --fill-gray-64:  rgba(28,28,28,0.64);
      --fill-blue-8: rgba(0,102,255,0.08);
      --fill-blue-16: rgba(0,102,255,0.16);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Chiron GoRound TC', sans-serif;
      background: var(--fill-gray6);
      color: var(--fill-black);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== Header ===== */
    header {
      background: var(--fill-gray6);
      padding: 24px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 200;
    }
    .logo { display: flex; align-items: center; gap: 16px; }
    .logo-icon {
      width: 40px; height: 40px; border-radius: 50%; overflow: hidden;
      flex-shrink: 0; object-fit: cover;
    }
    .logo h1 { font-size: 24px; font-weight: 700; letter-spacing: 1px; color: var(--fill-black); }
    .logo h1 span { color: var(--fill-blue); }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .header-info { font-family: 'Space Mono', monospace; font-size: 14px; color: var(--fill-black); }

    /* View Toggle */
    .view-toggle {
      display: flex;
      background: none; border: 1px solid var(--fill-blue);
      border-radius: 8px;
      overflow: hidden;
    }
    .view-btn {
      padding: 8px 16px;
      font-size: 14px;
      font-family: 'Chiron GoRound TC', sans-serif;
      font-weight: 400;
      background: none; border: none;
      color: var(--fill-black); cursor: pointer;
      transition: background 0.18s, color 0.18s, font-weight 0.18s;
      display: flex; align-items: center; gap: 4px;
    }
    .map-icon-fill { display: none; }
    .view-btn.active .map-icon-outline { display: none; }
    .view-btn.active .map-icon-fill { display: block; }
    .view-btn:hover { color: var(--fill-blue); }
    .view-btn.active { background: var(--fill-blue); color: var(--fill-white); font-weight: 500; }

    /* ===== Toolbar ===== */
    .toolbar {
      padding: 24px 20px;
      display: flex; align-items: center; gap: 24px;
      flex-shrink: 0;
      background: var(--fill-gray5);
    }
    .search-box {
      display: flex; align-items: center;
      background: var(--fill-gray6);
      border-radius: 9999px; gap: 12px;
      padding: 16px 16px;
      width: 400px;
      flex-shrink: 0;
    }
    .search-box input {
      background: none; border: none; outline: none;
      color: var(--fill-black); font-family: 'Chiron GoRound TC', sans-serif;
      font-size: 14px; width: 100%;
    }
    .search-box input::placeholder { color: var(--fill-gray-64); }
    .search-box input:-webkit-autofill,
    .search-box input:-webkit-autofill:focus {
     -webkit-box-shadow: 0 0 0 1000px var(--fill-gray6) inset;
     box-shadow: 0 0 0 1000px var(--fill-gray6) inset;
    }
    .search-clear-btn { display: none; background: none; border: none; padding: 0; cursor: pointer; color: var(--fill-black); flex-shrink: 0; line-height: 0; }
    .search-clear-btn:hover { color: var(--fill-blue); }
    .count-badge { font-family: 'Chiron GoRound TC', sans-serif; font-size: 14px; color: var(--fill-black); white-space: nowrap; margin-left: auto; }
    .count-badge strong { color: var(--fill-blue); font-size: 20px; font-weight: 700; }

    /* ===== Filter Chips ===== */
    .filter-bar {
      background: var(--fill-gray5);
      padding: 0px 20px 24px;
      display: flex; align-items: center; gap: 16px;
      flex-shrink: 0;
    }
    .filter-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 8px 16px;
      font-size: 14px;
      line-height: 1.2;
      font-family: 'Chiron GoRound TC', sans-serif;
      font-weight: 400;
      background: var(--gray-8);
      border: 1px solid var(--gray-16);
      border-radius: 20px;
      color: var(--black);
      cursor: pointer;
      transition: background 0.18s, color 0.18s, border-color 0.18s;
      white-space: nowrap;
    }
    .filter-chip:hover { color: var(--fill-blue); border-color: var(--fill-blue); font-weight: 500; }
    .filter-chip.active { background: var(--fill-blue); color: var(--fill-white); border-color: var(--fill-blue); }
    .chip-icon-fill { display: none; }
    .filter-chip.active .chip-icon-outline { display: none; }
    .filter-chip.active .chip-icon-fill { display: inline; }

    /* Badge */
    .type-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      align-self: flex-start;
      font-size: 12px; font-weight: 500;
      padding: 4px 8px; border-radius: 9999px;
      color: var(--fill-black);
    }
    .type-badge.gacha { background: var(--fill-white); border: 1px solid var(--fill-orange); color: var(--fill-orange); }
    .type-badge.photocard { background: var(--fill-white); border: 1px solid var(--fill-green); color: var(--fill-green); }

    @media (max-width: 640px) {
      .filter-bar { padding: 12px 20px 12px; gap: 8px; overflow-x: auto; }
      .filter-bar::-webkit-scrollbar { display: none; }
    }

    /* ===== Content ===== */
    .content { flex: 1; overflow: hidden; display: flex; }

    /* ===== Grid View ===== */
    #gridView {
      width: 100%; height: 100%; overflow-y: auto; padding: 24px 20px;
      display: none;
    }
    #gridView.active { display: block; }
    #gridView::-webkit-scrollbar { width: 5px; }
    #gridView::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 4px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    /* ===== Grid cards ===== */
    .loc-card-grid {
      background: var(--fill-blue-8);
      border-radius: 16px;
      border: 1px solid transparent;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      display: flex; flex-direction: column;
    }
    .loc-card-grid:hover {
      border-color: var(--fill-blue);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px var(--fill-blue-16);
    }
    
    .card-top { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .card-name { font-weight: 700; font-size: 16px; line-height: 1.35; color: var(--fill-black); }
    .card-limited { font-size: 14px; color: var(--fill-black); font-weight: 500; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag {
      font-size: 14px; padding: 4px 8px; border-radius: 20px;
      background: var(--fill-gray-8); color: var(--fill-black);
      border: 1px solid var(--fill-gray-64);
    }
    .card-actions { padding: 0px 16px 16px; display: flex; align-items: center; gap: 8px; margin-top: auto; }
    .btn-gmaps {
      display: inline-flex; align-items: center; gap: 5px;
      color: var(--fill-blue); font-size: 14px; font-weight: 400;
      font-family: 'Chiron GoRound TC', sans-serif;
      text-decoration: underline; text-underline-offset: 3px;
      background: none; border: none; padding: 0;
      transition: opacity 0.2s; white-space: nowrap;
    }
    .btn-gmaps:hover { opacity: 0.75; }
    .btn-expand {
      display: inline-flex; align-items: center; gap: 2px;
      padding: 4px 8px;
      background: var(--fill-blue-8); border: var(--fill-blue) 1px solid;
      border-radius: 4px; color: var(--fill-blue); font-size: 12px;
      font-family: 'Chiron GoRound TC', sans-serif; cursor: pointer;
      transition: opacity 0.2s;
      margin-left: auto;
    }
    .btn-expand:hover { opacity: 0.85; }
    .btn-expand.open { opacity: 0.85; }
    .chevron { display: inline-block; font-style: normal; }

    .card-detail { overflow: hidden; transition: max-height 0.35s ease; border-top: 1px solid transparent; }
    .card-detail.open { border-top-color: var(--gray-16); }
    .card-detail-inner { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 8px; }
    .detail-row { display: flex; gap: 8px; font-size: 13px; align-items: flex-start; }
    .detail-icon { flex-shrink: 0; font-size: 14px; margin-top: 1px; }
    .detail-text { color: var(--gray-64); line-height: 1.5; }

    /* Grid carousel */
    .carousel-grid { margin-top: 4px; background: var(--gray-8); border-radius: 10px; overflow: hidden; }
    .carousel-grid-img-wrap { width: 100%; background: var(--gray-16); display: flex; align-items: center; justify-content: center; }
    .carousel-grid-img { width: 100%; height: auto; cursor: zoom-in; display: block; }
    .carousel-controls-grid { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 8px; }
    .single-img-wrap { margin-top: 4px; border-radius: 8px; overflow: hidden; }
    .single-img-wrap img { width: 100%; height: auto; object-fit: unset; cursor: zoom-in; display: block; }

    /* ===== Map View ===== */
    #mapView { width: 100%; height: 100%; display: none; }
    #mapView.active { display: flex; }

    /* ===== Sidebar ===== */
    .sidebar {
      width: 360px;
      background: var(--off-white);
      border-right: 1px solid var(--gray-16);
      display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
    }
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--gray-16);
    }
    .sidebar-header h2 {
      font-size: 13px; color: var(--gray-64);
      text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px;
    }
    .location-list { flex: 1; overflow-y: auto; padding: 24px 20px; }
    .location-list::-webkit-scrollbar { width: 4px; }
    .location-list::-webkit-scrollbar-track { background: transparent; }
    .location-list::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 4px; }

    /* Sidebar card */
    .loc-card {
      background: var(--fill-blue-8);
      border-radius: 16px; padding: 16px; margin-bottom: 20px;
      cursor: pointer; border: 1px solid transparent;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .loc-card:hover { border-color: var(--fill-blue); transform: translateX(3px); box-shadow: 0 8px 24px rgba(0,102,255,0.24); }
    .loc-card.active { border-color: var(--fill-blue); }
    .loc-name { font-weight: 700; font-size: 16px; color: var(--fill-black); margin-top: 12px; margin-bottom: 14px; }
    .loc-limited { font-size: 14px; color: var(--fill-black); font-weight: 500; margin-bottom: 12px; }
    .loc-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .loc-tags .tag { font-size: 14px; padding: 4px 8px; }

    /* Map */
    #map { flex: 1; }
    .mobile-map-search { display: none; }

    /* ===== Leaflet popup ===== */
    .leaflet-popup-content-wrapper {
      background: var(--fill-gray6); color: var(--fill-black);
      border: 1px solid var(--fill-blue); border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      font-family: 'Chiron GoRound TC', sans-serif;
    }
    .leaflet-popup-content { margin: 16px !important; position: relative; max-height: 70vh; overflow-y: auto; }
    .popup-close-btn {
      position: absolute; top: -4px; right: -4px; z-index: 10;
      width: 24px; height: 24px;
      background: none; border: none; color: var(--fill-black);
      font-size: 18px; cursor: pointer; line-height: 1;
      display: flex; align-items: center; justify-content: center;
    }
    .popup-close-btn:hover { color: var(--fill-blue); }
    .leaflet-popup-tip { background: var(--fill-gray6); }
    .popup-title { font-weight: 700; font-size: 16px; margin-bottom: 0; color: var(--fill-black); flex: 1; }
    .popup-addr { font-size: 14px; color: var(--fill-black); margin-bottom: 0; }
    .popup-limited {
      display: inline-block; padding: 4px 8px;
      background: var(--fill-gray-8); border: 1px solid var(--fill-gray-64);
      border-radius: 9999px; color: var(--fill-black); font-size: 14px; font-weight: 400;
      margin-top: 4px;
    }
    .popup-img-wrap {
      background: var(--fill-gray-8); border-radius: 8px;
      padding: 12px; margin-top: 12px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .popup-img { width: 100%; height: auto; border-radius: 8px; display: block; cursor: zoom-in; }
    .popup-gmaps-link {
      display: block; margin-top: 12px; color: var(--fill-blue) !important;
      font-size: 14px; font-weight: 400; text-decoration: underline; transition: opacity 0.2s;
    }
    .popup-gmaps-link:hover { opacity: 0.75; }
    .leaflet-popup-content .popup-gmaps-link { color: var(--fill-blue) !important; text-decoration: underline !important; }

    /* Popup carousel */
    .carousel { margin-bottom: 4px; }
    .carousel-img-wrap { display: flex; align-items: center; justify-content: center; }
    .carousel-controls { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 8px; }
    .carousel-btn {
      background: var(--fill-blue); color: var(--fill-white); border: none; border-radius: 50%;
      width: 20px; height: 20px; min-width: 20px; font-size: 14px; font-weight: bold;
      line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: opacity 0.2s; padding: 0;
    }
    .carousel-btn:hover { opacity: 0.8; }
    .carousel-counter { font-size: 12px; color: var(--fill-black); min-width: 32px; text-align: center; }

    /* ===== Lightbox ===== */
    .lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.9); z-index: 99999;
      align-items: center; justify-content: center; cursor: zoom-out;
    }
    .lightbox.show { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 8px; }

    /* ===== Grid Detail Modal ===== */
    .grid-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 9999;
      align-items: center; justify-content: center;
      padding: 20px;
    }
    .grid-modal-overlay.show { display: flex; }
    .grid-modal-box {
      background: var(--fill-gray6); border: 1px solid var(--fill-blue);
      border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      width: 100%; max-width: 400px; max-height: 90vh;
      position: relative; overflow: hidden;
      display: flex; flex-direction: column;
    }
    .grid-modal-close {
      position: absolute; top: 16px; right: 16px;
      width: 24px; height: 24px; flex-shrink: 0;
      background: none; border: none; color: var(--black);
      font-size: 18px; cursor: pointer; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }
    .grid-modal-close:hover { color: var(--fill-blue); }
    .grid-modal-content { padding: 0 16px 16px; overflow-y: auto; flex: 1; }
    .modal-header { display: flex; align-items: center; padding-right: 4px; margin-bottom: 8px; }
    .modal-info-section { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
    .modal-type-badge { margin: 16px 0 12px; }

    /* ===== Empty ===== */
    .empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--gray-64); font-size: 15px; }

    /* ===== Mobile ===== */
    @media (max-width: 640px) {
      .logo h1 { font-size: 16px; }
      .header-info { display: none; }
      #gridView { padding: 20px; }
      .grid { grid-template-columns: 1fr; gap: 20px; }
      .toolbar { padding: 12px 20px; }
      .search-box { width: 100%; flex-shrink: 1; }
      .view-btn .label { display: none; }

      /* 地圖模式：上地圖下列表 */
      #mapView {
        flex-direction: column;
        position: relative;
      }
      #map {
        flex: 1;
        min-height: 200px;
        order: -1;
      }
      .sidebar {
        width: 100%;
        border-right: none;
        border-top: 1px solid var(--gray-16);
        height: 260px;
        flex-shrink: 0;
        flex-direction: column;
        overflow: hidden;
      }
      .sidebar-header { padding: 10px 16px 6px; }
      .mobile-map-search {
        display: flex;
        align-items: center;
        background: var(--gray-16);
        border-radius: 8px;
        padding: 12px 0px; gap: 8px;
        margin: 12px 20px;
      }
      .mobile-map-search input {
        background: none; border: none; outline: none;
        color: var(--fill-black); font-family: 'Chiron GoRound TC', sans-serif;
        font-size: 16px; width: 100%;
        transform: scale(0.875); transform-origin: left center;
      }
      .mobile-map-search input::placeholder { color: var(--gray-64); }
      .location-list { padding: 20px 20px 20px; }
      .mobile-count-badge { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--fill-black); white-space: nowrap; }
      .mobile-count-badge strong { color: var(--fill-blue); font-size: 13px; }
      .leaflet-popup-content { max-height: 40vh !important; overflow-y: auto !important; overflow-x: hidden !important; }      body.map-view .toolbar { display: none; }
    }

  </style>
</head>

    function setView(view) {
      document.getElementById('btnGrid').classList.toggle('active', view === 'grid');

      document.getElementById('gridView').classList.toggle('active', view === 'grid');

      document.body.classList.toggle('map-view', view === 'map');

        initMap();
        setTimeout(() => { if (map) map.invalidateSize(); }, 50);

    function initMap() {
      if (map) return;
      map = L.map('map').setView([23.6, 121.0], 8);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {

    // =============================================
    // 🖼️ Google Drive 轉圖片網址
    // =============================================
    function driveUrlToImage(url) {
      if (!url) return '';
      const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if (match) return `https://drive.google.com/uc?export=view&id=${match[1]}`;
      return url;
    }

    // =============================================
    // 🔧 解析 CSV 單列
    // =============================================
    function parseCSVRow(row) {
      const result = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < row.length; i++) {
        const char = row[i];
        if (char === '"') { inQuotes = !inQuotes; }
        else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
        else { current += char; }
      }
      result.push(current.trim());
      return result;
    }

    // =============================================
    // 📥 載入 Google Sheet
    // =============================================
    async function loadFromSheet() {
      document.getElementById('grid').innerHTML = '<div class="empty-state">⏳ 載入資料中...</div>';
      try {
        const response = await fetch(SHEET_CSV_URL);
        const csvText = await response.text();
        const rows = csvText.trim().split('\n');

        const firstRow = parseCSVRow(rows[1] || '');
        const lastUpdated = firstRow[14] || '';
        document.getElementById('lastUpdated').textContent =
          lastUpdated ? '最後更新：' + lastUpdated : '社群共建 · 持續更新';

        const locations = rows.slice(1).map(row => {
          const cols = parseCSVRow(row);
          return {
            type:      (cols[0] || '抽卡機').trim(),
            name:      cols[1] || '',
            venue:     cols[2] || '',
            city:      cols[3] || '',
            addr:      cols[4] || '',
            lat:       parseFloat(cols[5]),
            lng:       parseFloat(cols[6]),
            limited:   cols[7] || '',
            character: cols[8] || '',
            image:     cols[9] || '',
            edition:   cols[10] || '',
            perDraw:   cols[11] || '',
            note:      cols[12] || '',
            hours:     cols[13] || '',
          };
        }).filter(loc => loc.name && !isNaN(loc.lat) && !isNaN(loc.lng));

        locations.sort((a, b) => {
          const getEnd = l => {
            if (!l) return new Date('9999/12/31');
            const p = l.split('～');
            return new Date(p[p.length-1].trim().replace(/\//g, '-'));
          };
          return getEnd(a.limited) - getEnd(b.limited);
        });

        allLocations = locations;
        currentFiltered = locations;
        renderGrid(locations);

      } catch (err) {
        console.error('載入失敗：', err);
        document.getElementById('grid').innerHTML =
          '<div class="empty-state">❌ 資料載入失敗<br><small>請確認 Sheet 已設定公開發布</small></div>';
      }
    }

    // =============================================
    // 🔍 搜尋 + 篩選
    // =============================================
    function syncCount(n) {
      document.getElementById('countBadge').textContent = n;
      document.getElementById('mobileCountBadge').textContent = n;
    }

    function applyFilters() {
      const kw = (document.getElementById('searchInput').value || '').trim().toLowerCase();
      currentFiltered = allLocations.filter(loc => {
        const matchType = currentTypeFilter === 'all' || loc.type === currentTypeFilter;
        const matchKw = !kw ||
          loc.name.toLowerCase().includes(kw) ||
          loc.addr.toLowerCase().includes(kw) ||
          loc.city.toLowerCase().includes(kw) ||
          loc.venue.toLowerCase().includes(kw) ||
          loc.character.toLowerCase().includes(kw) ||
          loc.edition.toLowerCase().includes(kw);
        return matchType && matchKw;
      });
      renderGrid(currentFiltered);
      syncCount(currentFiltered.length);
      if (map) renderMapLocations(currentFiltered);
    }

    function handleSearch(kw) {
      applyFilters();
    }

    // Filter chips
    document.querySelectorAll('.filter-chip').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentTypeFilter = this.getAttribute('data-filter');
        applyFilters();
      });
    });

    document.getElementById('searchInput').addEventListener('input', function () {
      document.getElementById('clearSearch').style.display = this.value ? 'block' : 'none';
      applyFilters();
    });
    document.getElementById('mapSearchInput').addEventListener('input', function () {
      document.getElementById('clearMapSearch').style.display = this.value ? 'block' : 'none';
      document.getElementById('searchInput').value = this.value;
      document.getElementById('clearSearch').style.display = this.value ? 'block' : 'none';
      applyFilters();
    });
    document.getElementById('clearSearch').addEventListener('click', function () {
      document.getElementById('searchInput').value = '';
      document.getElementById('mapSearchInput').value = '';
      this.style.display = 'none';
      document.getElementById('clearMapSearch').style.display = 'none';
      applyFilters();
    });
    document.getElementById('clearMapSearch').addEventListener('click', function () {
      document.getElementById('searchInput').value = '';
      document.getElementById('mapSearchInput').value = '';
      this.style.display = 'none';
      document.getElementById('clearSearch').style.display = 'none';
      applyFilters();
    });

    // =============================================
    // 🖱️ 事件委派（輪播、Lightbox）
    // =============================================
    document.addEventListener('click', function (e) {
      // Grid carousel
      const gridBtn = e.target.closest('[data-grid-action]');
      if (gridBtn) {
        e.stopPropagation();
        const action = gridBtn.getAttribute('data-grid-action');
        const cid = gridBtn.getAttribute('data-grid-cid');
        const el = document.getElementById(cid);
        if (!el) return;
        const imgs = JSON.parse(el.getAttribute('data-imgs'));
        let idx = parseInt(el.getAttribute('data-index'));
        idx = action === 'prev' ? (idx - 1 + imgs.length) % imgs.length : (idx + 1) % imgs.length;
        el.setAttribute('data-index', idx);
        const img = el.querySelector('.carousel-grid-img');
        img.src = imgs[idx];
        img.setAttribute('data-lightbox', imgs[idx]);
        el.querySelector('.carousel-counter').textContent = (idx + 1) + ' / ' + imgs.length;
        return;
      }

      // Lightbox（grid）
      const lb = e.target.closest('[data-lightbox]');
      if (lb && !e.target.closest('.leaflet-popup-content')) {
        openLightbox(lb.getAttribute('data-lightbox') || lb.src);
        return;
      }
    });

    // Map popup: carousel + lightbox（capture mode，原始版）
    document.addEventListener('click', function(e) {
      const btn = e.target.closest('[data-carousel-action]');
      if (btn) {
        e.stopPropagation(); e.preventDefault();
        const action = btn.getAttribute('data-carousel-action');
        const id = btn.getAttribute('data-carousel-id');
        const el = document.getElementById(id);
        if (!el) return;
        const imgs = JSON.parse(el.getAttribute('data-imgs'));
        let idx = parseInt(el.getAttribute('data-index'));
        idx = action === 'prev' ? (idx - 1 + imgs.length) % imgs.length : (idx + 1) % imgs.length;
        el.setAttribute('data-index', idx);
        const img = el.querySelector('.carousel-img');
        img.src = imgs[idx];
        img.setAttribute('data-lightbox', imgs[idx]);
        el.querySelector('.carousel-counter').textContent = (idx + 1) + ' / ' + imgs.length;
        return;
      }
      // Lightbox（popup）
      const img = e.target.closest('[data-lightbox]');
      if (img && e.target.closest('.leaflet-popup-content')) {
        e.stopPropagation(); e.preventDefault();
        const carouselImg = img.classList.contains('carousel-img') ? img : (img.querySelector('.carousel-img') || img);
        openLightbox(carouselImg.src);
        return;
      }
    }, true);

      }

      document.getElementById('gridModalContent').innerHTML = `
        <div class="type-badge ${loc.type === '相卡機' ? 'photocard' : 'gacha'}" style="margin-top:16px;margin-bottom:12px;">${loc.type === '相卡機' ? '<svg xmlns="http://www.w3.org/2000/svg" height="16px" viewBox="0 -960 960 960" width="16px" fill="currentColor"><path d="M480-264q72 0 120-49t48-119q0-69-48-118.5T480-600q-72 0-120 49.5T312-432q0 70 48 119t120 49Zm0-72q-42 0-69-27t-27-68q0-40 27-68.5t69-28.5q42 0 69 28.5t27 68.5q0 41-27 68t-69 27ZM168-144q-29 0-50.5-21.5T96-216v-432q0-29 21.5-50.5T168-720h120l50-67q11-14 26-21.5t32-7.5h168q17 0 32 7.5t26 21.5l50 67h120q30 0 51 21.5t21 50.5v432q0 29-21 50.5T792-144H168Z"/></svg> 相卡機' : '<svg xmlns="http://www.w3.org/2000/svg" height="16px" viewBox="0 -960 960 960" width="16px" fill="currentColor"><path d="m612-404 31-107q3-11-1-22t-14-18l-93-63q-8-5-16.5-2T508-604l-31 107q-3 11 .5 22t13.5 18l93 63q8 5 17 2t11-12ZM168-222l-30-15q-28-13-38-40t3-55l65-140v250Zm148 78q-31 0-53.5-20.5T240-216v-288l134 360h-58Zm206-4q-31 11-56-1t-36-43L259-660q-11-31 .5-56.5T302-753l294-107q31-11 56 .5t36 42.5l172 472q11 31-.5 56T817-253L522-148Z"/></svg> 抽卡機'}</div>
        <div class="modal-header">
          <div class="popup-title">${loc.name}</div>
        </div>
        ${loc.limited ? `<div class="popup-limited">期間限定：${loc.limited}</div>` : ''}
        <div class="modal-info-section">
          ${loc.venue ? `<div class="popup-addr">🏢 場地：${loc.venue}</div>` : ''}
          ${loc.addr ? `<div class="popup-addr">📍 地址：${loc.addr}</div>` : ''}
          ${loc.hours ? `<div class="popup-addr">🕐 營業時間：${loc.hours}</div>` : ''}
          ${loc.character ? `<div class="popup-addr">🌟 IP：${loc.character}</div>` : ''}
          ${loc.edition ? `<div class="popup-addr">🃏 彈數：${loc.edition}</div>` : ''}
          ${loc.perDraw ? `<div class="popup-addr">💸 價格與張數：${loc.perDraw}</div>` : ''}
          ${loc.note ? `<div class="popup-addr">📝 ${loc.note}</div>` : ''}
        </div>
        <a href="${googleMapsUrl}" target="_blank" class="popup-gmaps-link">🗺️ 前往 Google Maps 查看 →</a>
        ${imgHtml}
      `;
      document.getElementById('gridModal').classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function closeGridModal(e) {
      if (e && e.target !== document.getElementById('gridModal')) return;
      document.getElementById('gridModal').classList.remove('show');
      document.body.style.overflow = '';
    }

    function openLightbox(src) {
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightbox').classList.add('show');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('show');
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    // 初始化
    setView('grid');
    loadFromSheet();
  </script>

</body>
</html>
